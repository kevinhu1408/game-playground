// ═══════ 创建宝可梦实例 ═══════
function makePokemon(id,level){
  const base=POKEMON.find(p=>p.id===id);if(!base)return null;
  const lvMul=1+(level-1)*0.05;
  const p={
    id:base.id,name:base.name,type:base.type,level:level,
    maxHp:Math.floor(base.hp*lvMul),hp:Math.floor(base.hp*lvMul),
    atk:Math.floor(base.atk*lvMul),def:Math.floor(base.def*lvMul),spd:Math.floor(base.spd*lvMul),
    exp:0,expNext:level*level*3+10,
    moves:base.moves.slice(0,2+Math.min(Math.floor(level/8),2)),
    color:base.color,color2:base.color2,spot:base.spot,
    evolution:base.evolution
  };
  return p;
}

// ═══════ 绘制像素精灵 ═══════
function drawPlayer(x,y,dir,frame){
  const s=TILE;
  ctx.save();ctx.translate(x,y);
  // 身体
  const legOff=frame%2===1?2:0;
  // 帽子
  ctx.fillStyle=COL.hat;
  ctx.fillRect(2,0,12,4);
  if(dir===3)ctx.fillRect(12,1,3,3);
  if(dir===2)ctx.fillRect(-1,1,3,3);
  // 头发
  ctx.fillStyle=COL.hair;
  ctx.fillRect(3,3,10,3);
  // 脸
  ctx.fillStyle=COL.skin;
  ctx.fillRect(4,4,8,5);
  // 眼睛
  if(dir!==1){
    ctx.fillStyle='#222';
    if(dir===0){ctx.fillRect(5,5,2,2);ctx.fillRect(9,5,2,2);}
    if(dir===2){ctx.fillRect(4,5,2,2);ctx.fillRect(8,5,2,2);}
    if(dir===3){ctx.fillRect(6,5,2,2);ctx.fillRect(10,5,2,2);}
  }
  // 上衣
  ctx.fillStyle=COL.shirt;
  ctx.fillRect(3,9,10,5);
  // 背包
  if(dir===2){ctx.fillStyle=COL.bag;ctx.fillRect(11,9,3,4);}
  if(dir===3){ctx.fillStyle=COL.bag;ctx.fillRect(2,9,3,4);}
  // 裤子
  ctx.fillStyle=COL.pants;
  ctx.fillRect(4,14-legOff,4,3+legOff);
  ctx.fillRect(8,14+legOff,4,3-legOff);
  // 鞋
  ctx.fillStyle=COL.shoe;
  ctx.fillRect(4,16,4,1);ctx.fillRect(8,16,4,1);
  ctx.restore();
}

function drawCharmander(x,y,size,flip){
  ctx.save();ctx.translate(x,y);
  if(flip){ctx.scale(-1,1);ctx.translate(-size,0);}
  const pw=CHAR_PIX[0].length,ph=CHAR_PIX.length;
  const ps=size/Math.max(pw,ph);
  for(let py=0;py<ph;py++){
    for(let px=0;px<pw;px++){
      const c=CHAR_PIX[py][px];
      if(c===0)continue;
      ctx.fillStyle=CHAR_PAL[c];
      ctx.fillRect(Math.floor(px*ps),Math.floor(py*ps),Math.ceil(ps),Math.ceil(ps));
    }
  }
  ctx.restore();
}

  if(flip){ctx.scale(-1,1);ctx.translate(-size,0);}
  const s=size;
  // 身体(椭圆)
  ctx.fillStyle=poke.color;
  ctx.beginPath();ctx.ellipse(s/2,s*.55,s*.4,s*.4,0,0,Math.PI*2);ctx.fill();
  // 肚子
  ctx.fillStyle=poke.spot||poke.color2;
  ctx.beginPath();ctx.ellipse(s/2,s*.6,s*.25,s*.28,0,0,Math.PI*2);ctx.fill();
  // 头
  ctx.fillStyle=poke.color;
  ctx.beginPath();ctx.ellipse(s/2,s*.28,s*.32,s*.28,0,0,Math.PI*2);ctx.fill();
  // 眼睛
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(s*.35,s*.22,s*.08,s*.09,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.65,s*.22,s*.08,s*.09,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(s*.37,s*.23,s*.04,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(s*.67,s*.23,s*.04,0,Math.PI*2);ctx.fill();
  // 嘴
  ctx.fillStyle=poke.color2;
  ctx.beginPath();ctx.arc(s/2,s*.38,s*.06,0,Math.PI);ctx.fill();
  // 耳朵/角
  ctx.fillStyle=poke.color;
  ctx.beginPath();ctx.moveTo(s*.2,s*.12);ctx.lineTo(s*.1,0);ctx.lineTo(s*.3,s*.1);ctx.fill();
  ctx.beginPath();ctx.moveTo(s*.8,s*.12);ctx.lineTo(s*.9,0);ctx.lineTo(s*.7,s*.1);ctx.fill();
  // 脚
  ctx.fillStyle=poke.color2;
  ctx.fillRect(s*.25,s*.85,s*.15,s*.12);
  ctx.fillRect(s*.6,s*.85,s*.15,s*.12);
  // 尾巴
  ctx.fillStyle=poke.color;
  ctx.beginPath();ctx.moveTo(s*.85,s*.5);ctx.quadraticCurveTo(s*1.1,s*.3,s*.95,s*.15);ctx.lineWidth=s*.06;ctx.strokeStyle=poke.color;ctx.stroke();
  ctx.restore();
}

function drawTile(tx,ty,type,screenX,screenY){
  const s=TILE;
  switch(type){
    case 0:// 草地
      ctx.fillStyle=COL.grass;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.grassLight;
      if((tx+ty)%3===0){ctx.fillRect(screenX+4,screenY+3,2,3);ctx.fillRect(screenX+10,screenY+9,2,3);}
      break;
    case 1:// 路
      ctx.fillStyle=COL.path;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.pathDark;
      if((tx+ty)%4===0)ctx.fillRect(screenX+2,screenY+6,3,2);
      break;
    case 2:// 草丛
      ctx.fillStyle=COL.darkgreen;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.grassLight;
      for(let i=0;i<3;i++){
        const gx=screenX+2+i*5,gy=screenY+s-6;
        ctx.fillRect(gx,gy,1,5);ctx.fillRect(gx-1,gy+1,1,3);ctx.fillRect(gx+1,gy+1,1,3);
      }
      break;
    case 3:// 树
      ctx.fillStyle=COL.grass;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.treeDark;ctx.fillRect(screenX+5,screenY+8,6,8);
      ctx.fillStyle=COL.tree;
      ctx.beginPath();ctx.arc(screenX+8,screenY+6,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a7a3a';
      ctx.beginPath();ctx.arc(screenX+6,screenY+4,4,0,Math.PI*2);ctx.fill();
      break;
    case 4:// 水
      ctx.fillStyle=COL.water;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.waterLight;
      const wt=Date.now()/500;
      ctx.fillRect(screenX+Math.sin(wt+tx)*3+4,screenY+4,6,1);
      ctx.fillRect(screenX+Math.cos(wt+ty)*3+2,screenY+10,5,1);
      break;
    case 5:// 墙
      ctx.fillStyle=COL.wall;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.wallDark;
      ctx.fillRect(screenX,screenY+s-1,s,1);ctx.fillRect(screenX+s-1,screenY,1,s);
      break;
    case 6:// 门
      ctx.fillStyle=COL.wall;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle=COL.door;ctx.fillRect(screenX+2,screenY+2,s-4,s-2);
      ctx.fillStyle='#c0a030';ctx.fillRect(screenX+s-5,screenY+8,2,2);
      break;
    case 7:// 屋顶
      ctx.fillStyle=COL.roof;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle='#a02020';
      ctx.fillRect(screenX,screenY+s-2,s,2);
      break;
    case 8:// 围栏
      ctx.fillStyle=COL.grass;ctx.fillRect(screenX,screenY,s,s);
      ctx.fillStyle='#8b6e4e';
      ctx.fillRect(screenX,screenY+4,s,3);ctx.fillRect(screenX,screenY+11,s,3);
      ctx.fillRect(screenX+2,screenY+2,2,14);ctx.fillRect(screenX+12,screenY+2,2,14);
      break;
    case 9:// 花
      ctx.fillStyle=COL.grass;ctx.fillRect(screenX,screenY,s,s);
      const fc=['#ff6666','#ffaa33','#ff66aa','#aa66ff','#66aaff'];
      ctx.fillStyle=fc[(tx*3+ty*7)%fc.length];
      ctx.beginPath();ctx.arc(screenX+5,screenY+5,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(screenX+11,screenY+11,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffee44';
      ctx.fillRect(screenX+4,screenY+4,2,2);ctx.fillRect(screenX+10,screenY+10,2,2);
      break;
  }
}

// ═══════ 战斗系统 ═══════
let battleMenu=0,battleSel=0,battleMoveSel=0,battleLog=[],battleLogT=0;
let battleAnim={type:null,t:0,x:0,y:0};
let battlePhase='menu';// menu,movesel,anim,log,catch,run,win,lose

function startBattle(wildPoke){
  battleState={
    wild:wildPoke,myPoke:party[0],
    turn:0,phase:'intro'
  };
  battleMenu=0;battleSel=0;battleMoveSel=0;
  battleLog=['野生的 '+wildPoke.name+' 出现了！'];battleLogT=60;
  battlePhase='log';
  gameState='battle';
}

function calcDamage(attacker,defender,move){
  const m=MOVES[move];if(!m||m.power===0)return 0;
  let eff=1;
  if(TYPE_EFFECT[m.type]&&TYPE_EFFECT[m.type][defender.type])eff=TYPE_EFFECT[m.type][defender.type];
  const stab=m.type===attacker.type?1.5:1;
  const dmg=Math.floor(((2*attacker.level/5+2)*m.power*attacker.atk/defender.def/50+2)*stab*eff*(0.85+Math.random()*0.15));
  return{dmg:Math.max(1,dmg),eff:eff};
}

function doBattleMove(attacker,defender,move,isPlayer){
  const m=MOVES[move];
  if(!m)return;
  // 命中判定
  if(Math.random()*100>m.acc){
    battleLog.push((isPlayer?attacker.name:('野生'+attacker.name))+' 的攻击没有命中！');
    battleLogT=50;battlePhase='log';return;
  }
  if(m.power>0){
    const{dmg,eff}=calcDamage(attacker,defender,move);
    defender.hp=Math.max(0,defender.hp-dmg);
    battleLog.push((isPlayer?attacker.name:('野生'+attacker.name))+' 使用了 '+move+'！');
    if(eff>1)battleLog.push('效果拔群！');
    else if(eff<1&&eff>0)battleLog.push('效果不太好...');
    else if(eff===0)battleLog.push('没有效果...');
  }else{
    battleLog.push((isPlayer?attacker.name:('野生'+attacker.name))+' 使用了 '+move+'！');
    if(m.effect==='heal'){attacker.hp=Math.min(attacker.maxHp,attacker.hp+Math.floor(attacker.maxHp/2));battleLog.push(attacker.name+' 恢复了体力！');}
    if(m.effect==='defUp'){attacker.def=Math.floor(attacker.def*1.3);battleLog.push(attacker.name+' 的防御提升了！');}
    if(m.effect==='atkDown'){defender.atk=Math.max(1,Math.floor(defender.atk*0.7));battleLog.push(defender.name+' 的攻击下降了！');}
  }
  battleLogT=50;battlePhase='log';
}

function battleUpdate(){
  if(battlePhase==='log'){
    battleLogT--;
    if(battleLogT<=0&&kp('KeyZ')){
      battleLog.shift();
      if(battleLog.length>0){battleLogT=50;}
      else{
        // 检查胜负
        if(battleState.wild.hp<=0){
          if(!battleState.rewarded){
            battleState.rewarded=true;
            const expGain=Math.floor(battleState.wild.level*15+20);
            battleState.myPoke.exp+=expGain;
            battleLog.push('获得了 '+expGain+' 经验值！');
            if(battleState.myPoke.exp>=battleState.myPoke.expNext){
              battleState.myPoke.level++;
              battleState.myPoke.exp=0;
              battleState.myPoke.expNext=battleState.myPoke.level*battleState.myPoke.level*3+10;
              const base=POKEMON.find(p=>p.id===battleState.myPoke.id);
              const lvMul=1+(battleState.myPoke.level-1)*0.05;
              battleState.myPoke.maxHp=Math.floor(base.hp*lvMul);
              battleState.myPoke.hp=battleState.myPoke.maxHp;
              battleState.myPoke.atk=Math.floor(base.atk*lvMul);
              battleState.myPoke.def=Math.floor(base.def*lvMul);
              battleState.myPoke.spd=Math.floor(base.spd*lvMul);
              if(battleState.myPoke.moves.length<4&&base.moves.length>battleState.myPoke.moves.length){
                const newMove=base.moves[battleState.myPoke.moves.length];
                battleState.myPoke.moves.push(newMove);
                battleLog.push(battleState.myPoke.name+' 学会了 '+newMove+'！');
              }
              battleLog.push(battleState.myPoke.name+' 升级到了 Lv.'+battleState.myPoke.level+'！');
              if(battleState.myPoke.evolution&&battleState.myPoke.level>=battleState.myPoke.evolution.level){
                const evoBase=POKEMON.find(p=>p.id===battleState.myPoke.evolution.to);
                if(evoBase){
                  battleLog.push(battleState.myPoke.name+' 进化成了 '+evoBase.name+'！');
                  battleState.myPoke.id=evoBase.id;
                  battleState.myPoke.name=evoBase.name;
                  battleState.myPoke.color=evoBase.color;
                  battleState.myPoke.color2=evoBase.color2;
                  battleState.myPoke.spot=evoBase.spot;
                  battleState.myPoke.evolution=evoBase.evolution;
                }
              }
            }
            battleLogT=50;battlePhase='log';
          }else{
            // 经验已结算，结束战斗
            gameState='overworld';encounterCooldown=60;
          }
          return;
        }
        if(battleState.myPoke.hp<=0){
          if(!battleState.lost){
            battleState.lost=true;
            battleLog.push(battleState.myPoke.name+' 倒下了...');
            battleLogT=50;battlePhase='log';
          }else{
            battleState.myPoke.hp=Math.floor(battleState.myPoke.maxHp/2);
            gameState='overworld';
            showDialog(['你的宝可梦全部倒下了...','回到了宝可梦中心。']);
            player.x=15;player.y=8;
          }
          return;
        }
        battlePhase='menu';
      }
    }
    return;
  }
  if(battlePhase==='menu'){
    if(kp('ArrowDown'))battleSel=(battleSel+1)%4;
    if(kp('ArrowUp'))battleSel=(battleSel+3)%4;
    if(kp('KeyZ')){
      if(battleSel===0)battlePhase='movesel';// 战斗
      if(battleSel===1){// 背包
        if(bag.pokeball>0){
          bag.pokeball--;
          const catchRate=Math.max(10,(100-battleState.wild.hp/battleState.wild.maxHp*80)*1.5);
          if(Math.random()*100<catchRate){
            if(party.length<6)party.push({...battleState.wild});
            battleLog.push('成功捕获了 '+battleState.wild.name+'！');
            battleState.wild.hp=0;
          }else{
            battleLog.push('啊！差一点就抓到了！');
            // 敌方回合
            const eMoves=battleState.wild.moves;
            const eMove=eMoves[Math.floor(Math.random()*eMoves.length)];
            doBattleMove(battleState.wild,battleState.myPoke,eMove,false);
          }
          battleLogT=50;battlePhase='log';
        }else{battleLog.push('没有精灵球了！');battleLogT=50;battlePhase='log';}
      }
      if(battleSel===2){// 宝可梦(切换)
        battleLog.push('目前只有一只宝可梦。');battleLogT=40;battlePhase='log';
      }
      if(battleSel===3){// 逃跑
        if(Math.random()<.7){
          battleLog.push('成功逃跑了！');battleLogT=40;battlePhase='log';
          battleState.wild.hp=0;// 标记结束
        }else{
          battleLog.push('逃跑失败！');
          const eMoves=battleState.wild.moves;
          const eMove=eMoves[Math.floor(Math.random()*eMoves.length)];
          doBattleMove(battleState.wild,battleState.myPoke,eMove,false);
          battleLogT=50;battlePhase='log';
        }
      }
    }
  }
  if(battlePhase==='movesel'){
    const moves=battleState.myPoke.moves;
    if(kp('ArrowDown'))battleMoveSel=(battleMoveSel+1)%moves.length;
    if(kp('ArrowUp'))battleMoveSel=(battleMoveSel+moves.length-1)%moves.length;
    if(kp('KeyX')){battlePhase='menu';return;}
    if(kp('KeyZ')){
      const myMove=moves[battleMoveSel];
      // 先手判定
      const myFirst=battleState.myPoke.spd>=battleState.wild.spd;
      if(myFirst){
        doBattleMove(battleState.myPoke,battleState.wild,myMove,true);
        if(battleState.wild.hp>0){
          const eMoves=battleState.wild.moves;
          const eMove=eMoves[Math.floor(Math.random()*eMoves.length)];
          doBattleMove(battleState.wild,battleState.myPoke,eMove,false);
        }
      }else{
        const eMoves=battleState.wild.moves;
        const eMove=eMoves[Math.floor(Math.random()*eMoves.length)];
        doBattleMove(battleState.wild,battleState.myPoke,eMove,false);
        if(battleState.myPoke.hp>0){
          doBattleMove(battleState.myPoke,battleState.wild,myMove,true);
        }
      }
      battleLogT=50;battlePhase='log';
    }
  }
}

  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(W-210,H/2+5,190,55);

  ctx.fillStyle='#fff';ctx.font='10px "Courier New"';
  ctx.fillText(mp.hp+'/'+mp.maxHp,W-200,H/2+52);
  // 经验条
  ctx.fillStyle='#333';ctx.fillRect(W-200,H/2+42,160,4);
  ctx.fillStyle='#3498db';ctx.fillRect(W-200,H/2+42,160*(mp.exp/mp.expNext),4);

  // 菜单/对话
  if(battlePhase==='log'&&battleLog.length>0){
    ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(10,H-60,W-20,50);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(12,H-58,W-24,46);
    ctx.fillStyle='#fff';ctx.font='13px "Courier New"';
    ctx.fillText(battleLog[0],24,H-32);
  }
  if(battlePhase==='menu'){
    ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(W-160,H-90,150,80);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(W-158,H-88,146,76);
    const opts=['战斗','背包','宝可梦','逃跑'];
    for(let i=0;i<4;i++){
      ctx.fillStyle=i===battleSel?'#ffd740':'#fff';
      ctx.font='13px "Courier New"';
      const ox=i%2*70,oy=Math.floor(i/2)*28;
      ctx.fillText((i===battleSel?'▶ ':' ')+opts[i],W-150+ox,H-66+oy);
    }
    ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(10,H-60,W-180,50);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(12,H-58,W-184,46);
    ctx.fillStyle='#fff';ctx.font='13px "Courier New"';
    ctx.fillText('要怎么做？',24,H-32);
  }
  if(battlePhase==='movesel'){
    ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(10,H-90,W-20,80);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(12,H-88,W-24,76);
    const moves=mp.moves;
    for(let i=0;i<moves.length;i++){
      const m=MOVES[moves[i]];
      ctx.fillStyle=i===battleMoveSel?'#ffd740':'#fff';
      ctx.font='13px "Courier New"';
      const ox=i%2*200,oy=Math.floor(i/2)*25;
      ctx.fillText((i===battleMoveSel?'▶ ':' ')+moves[i]+(m?' ('+m.type+')':''),24+ox,H-66+oy);
    }
  }
}

// ═══════ 大世界更新 ═══════
function overworldUpdate(dt){
  if(encounterCooldown>0)encounterCooldown--;

  if(!player.moving){
    let dx=0,dy=0;
    if(keys['ArrowDown']){dy=1;player.dir=0;}
    else if(keys['ArrowUp']){dy=-1;player.dir=1;}
    else if(keys['ArrowLeft']){dx=-1;player.dir=2;}
    else if(keys['ArrowRight']){dx=1;player.dir=3;}

    if(dx!==0||dy!==0){
      const nx=player.x+dx,ny=player.y+dy;
      // 碰撞检测
      if(nx>=0&&nx<MAP_W&&ny>=0&&ny<MAP_H){
        const tile=map[ny][nx];
        const blocked=tile===3||tile===4||tile===5||tile===7||tile===8;
        // NPC碰撞
        let npcBlock=false;
        for(const n of npcs){if(n.x===nx&&n.y===ny){npcBlock=true;break;}}
        if(!blocked&&!npcBlock){
          player.moving=true;player.moveT=0;
          player.targetX=nx;player.targetY=ny;
        }
      }
    }

    // Z键交互
    if(kp('KeyZ')){
      const fx=player.x+[0,0,-1,1][player.dir];
      const fy=player.y+[1,-1,0,0][player.dir];
      // NPC对话
      for(const n of npcs){
        if(n.x===fx&&n.y===fy){
          if(n.heal){
            showDialog(n.dialog,()=>{party.forEach(p=>{p.hp=p.maxHp;});showDialog(['你的宝可梦恢复了体力！']);});
          }else if(n.starterTrigger&&!starterChosen){
            showDialog(n.dialog,()=>{gameState='starter';});
          }else{
            showDialog(n.dialog);
          }
          break;
        }
      }
    }
  }else{
    player.moveT+=0.15;
    if(player.moveT>=1){
      player.x=player.targetX;player.y=player.targetY;
      player.moving=false;player.moveT=0;
      player.frame++;

      // 草丛遇敌
      if(map[player.y][player.x]===2&&encounterCooldown<=0&&party.length>0){
        if(Math.random()<0.15){
          // 根据区域决定野生宝可梦
          const wildPool=player.y<20?[10,12,13,15,16]:[10,12,15,18,19,20];
          const wId=wildPool[Math.floor(Math.random()*wildPool.length)];
          const wLv=Math.max(2,Math.floor(3+Math.random()*5+(35-player.y)*0.2));
          const wild=makePokemon(wId,wLv);
          startBattle(wild);
        }
      }
    }
  }

  // 相机跟随
  const px=(player.moving?player.x+(player.targetX-player.x)*player.moveT:player.x)*TILE;
  const py=(player.moving?player.y+(player.targetY-player.y)*player.moveT:player.y)*TILE;
  camera.x=px-W/2+TILE/2;
  camera.y=py-H/2+TILE/2;
}

function drawOverworld(){
  // 绘制地图
  const startTX=Math.floor(camera.x/TILE)-1;
  const startTY=Math.floor(camera.y/TILE)-1;
  const endTX=startTX+Math.ceil(W/TILE)+2;
  const endTY=startTY+Math.ceil(H/TILE)+2;

  for(let ty=startTY;ty<=endTY;ty++){
    for(let tx=startTX;tx<=endTX;tx++){
      if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H){
        ctx.fillStyle=COL.tree;ctx.fillRect(tx*TILE-camera.x,ty*TILE-camera.y,TILE,TILE);
        continue;
      }
      drawTile(tx,ty,map[ty][tx],tx*TILE-camera.x,ty*TILE-camera.y);
    }
  }

  // 绘制NPC
  for(const n of npcs){
    const sx=n.x*TILE-camera.x,sy=n.y*TILE-camera.y;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20)continue;
    // 简单NPC精灵
    ctx.fillStyle=n.sprite==='prof'?'#fff':n.sprite==='mom'?'#ff8888':n.sprite==='nurse'?'#ff6699':'#6699ff';
    ctx.fillRect(sx+3,sy+1,10,6);// 头
    ctx.fillStyle=COL.skin;ctx.fillRect(sx+4,sy+3,8,4);// 脸
    ctx.fillStyle=n.sprite==='prof'?'#887766':n.sprite==='mom'?'#cc6666':'#fff';
    ctx.fillRect(sx+3,sy+7,10,6);// 身体
    ctx.fillStyle='#222';ctx.fillRect(sx+4,sy+13,3,3);ctx.fillRect(sx+9,sy+13,3,3);// 脚
    // 眼睛
    ctx.fillStyle='#111';ctx.fillRect(sx+5,sy+4,2,2);ctx.fillRect(sx+9,sy+4,2,2);
  }

  // 绘制玩家
  const ppx=(player.moving?player.x+(player.targetX-player.x)*player.moveT:player.x)*TILE-camera.x;
  const ppy=(player.moving?player.y+(player.targetY-player.y)*player.moveT:player.y)*TILE-camera.y;
  drawPlayer(ppx,ppy,player.dir,player.frame);

  // 区域名称
  let areaName='';
  if(player.y>=35)areaName='真新镇';
  else if(player.y>=10)areaName='1号道路';
  else areaName='常磐市';
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,20);
  ctx.fillStyle='#fff';ctx.font='11px "Courier New"';ctx.fillText('  '+areaName+'  |  精灵球:'+bag.pokeball+'  伤药:'+bag.potion,5,14);
  if(party.length>0){
    const p=party[0];
    ctx.fillText(p.name+' Lv.'+p.level+' HP:'+p.hp+'/'+p.maxHp,W-200,14);
  }
}

// ═══════ 主循环 ═══════
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);

  if(gameState==='title'){
    drawTitle();
    if(kp('KeyZ')){
      gameState='overworld';
      showDialog(['大木博士: 欢迎来到宝可梦的世界！','这个世界里住着很多宝可梦。','去研究所找我选择你的搭档吧！']);
    }
  }
  else if(gameState==='starter'){
    drawStarterSelect();
    if(kp('ArrowLeft'))starterSel=(starterSel+2)%3;
    if(kp('ArrowRight'))starterSel=(starterSel+1)%3;
    if(kp('KeyZ')){
      const starterIds=[1,4,7];
      const starter=makePokemon(starterIds[starterSel],5);
      party.push(starter);
      starterChosen=true;
      gameState='overworld';
      showDialog(['你选择了 '+starter.name+'！','好好照顾它吧！','去1号道路冒险吧！']);
    }
  }
  else if(gameState==='overworld'){
    overworldUpdate(1/60);
    drawOverworld();
  }
  else if(gameState==='dialog'){
    drawOverworld();
    drawDialog();
    if(kp('KeyZ'))advanceDialog();
  }
  else if(gameState==='battle'){
    drawBattle();
    battleUpdate();
  }
}
loop();
</script>
