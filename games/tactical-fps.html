<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>无畏契约</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Segoe UI',sans-serif;cursor:default}
canvas{display:block}

/* Crosshair */
#ch{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;width:24px;height:24px}
.cx{position:absolute;background:#0f0;border-radius:1px}
.cx-t{width:2px;height:7px;left:11px;top:0}.cx-b{width:2px;height:7px;left:11px;bottom:0}
.cx-l{width:7px;height:2px;left:0;top:11px}.cx-r{width:7px;height:2px;right:0;top:11px}
.cx-d{position:absolute;width:2px;height:2px;background:#0f0;left:11px;top:11px;border-radius:50%}
#ch.hit .cx,#ch.hit .cx-d{background:#f44}
#ch.kill .cx,#ch.kill .cx-d{background:#f0f}

/* HUD */
#hud-top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;padding:8px;pointer-events:none;z-index:10}
#timer{background:rgba(0,0,0,.7);color:#fff;padding:5px 18px;border-radius:4px;font-size:22px;font-weight:700;letter-spacing:2px}
#scores{position:fixed;top:8px;left:50%;transform:translateX(-50%);margin-top:42px;display:flex;gap:16px;pointer-events:none;z-index:10}
.ts{font-size:26px;font-weight:700;padding:3px 14px;border-radius:4px}
.ts-a{color:#e74c3c;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25)}
.ts-d{color:#3498db;background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.25)}

#hud-bot{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:10px 18px;pointer-events:none;z-index:10}
.hb{background:rgba(10,10,20,.8);border:1px solid rgba(255,255,255,.08);padding:8px 14px;border-radius:5px}
.hl{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
.hv{color:#fff;font-size:20px;font-weight:700;margin-top:1px}
.hv-hp{color:#3ddc84}.hv-am{color:#ffd740}.hv-cr{color:#ffd740}

#abilities{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;z-index:10}
.ab{width:48px;height:48px;background:rgba(10,10,20,.8);border:2px solid rgba(255,255,255,.12);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.ab.rdy{border-color:rgba(255,255,255,.5)}
.ab-k{position:absolute;top:1px;left:3px;font-size:8px;color:rgba(255,255,255,.4);font-weight:700}
.ab-i{font-size:18px}.ab-c{position:absolute;bottom:1px;right:3px;font-size:9px;color:#ffd740}

/* Killfeed */
#kf{position:fixed;top:80px;right:14px;pointer-events:none;z-index:10}
.kfe{background:rgba(0,0,0,.6);padding:3px 8px;margin-bottom:2px;border-radius:3px;font-size:11px;color:#fff;border-left:3px solid #e74c3c;transition:opacity .5s}

/* Center msg */
#msg{position:fixed;top:34%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:38px;z-index:15;pointer-events:none;opacity:0;transition:opacity .3s;text-shadow:0 0 20px rgba(255,255,255,.3);letter-spacing:4px;text-align:center}
#dmg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9;opacity:0;transition:opacity .1s;background:radial-gradient(ellipse,transparent 40%,rgba(255,0,0,.4))}
.dir-ind{position:absolute;width:6px;height:36px;background:linear-gradient(transparent,rgba(255,60,30,.9),transparent);border-radius:3px;opacity:0;transition:opacity .3s;pointer-events:none;filter:blur(1px)}

/* Buy menu */
#buyMenu{position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;display:none;background:rgba(5,5,15,.95);overflow-y:auto;cursor:default}
.bm-inner{max-width:750px;margin:30px auto;padding:16px}
.bm-title{color:#fff;font-size:24px;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:4px}
.bm-cred{color:#ffd740;font-size:16px;text-align:center;margin-bottom:16px}
.bm-sec{margin-bottom:12px}
.bm-sh{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:2px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.08)}
.bm-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:6px}
.bm-i{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .12s}
.bm-i:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.bm-i.own{border-color:rgba(61,220,132,.4);background:rgba(61,220,132,.08)}
.bm-i.nope{opacity:.25;cursor:not-allowed}
.bm-n{color:#fff;font-size:13px;font-weight:600}.bm-p{color:#ffd740;font-size:12px}
.bm-close{color:rgba(255,255,255,.35);font-size:12px;text-align:center;margin-top:12px;letter-spacing:1.5px}

/* Agent select */
#agentSel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.97)}
.as-t{color:#fff;font-size:32px;font-weight:700;letter-spacing:5px;margin-bottom:24px}
.as-g{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:1100px}
.as-c{width:145px;padding:16px;border:2px solid rgba(255,255,255,.08);border-radius:8px;text-align:center;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.02)}
.as-c:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);transform:translateY(-3px)}
.as-ic{font-size:40px;margin-bottom:8px}
.as-nm{color:#fff;font-size:16px;font-weight:700;letter-spacing:1px}
.as-rl{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:1.5px;margin-top:2px}
.as-ab{display:flex;gap:4px;justify-content:center;margin-top:8px}
.as-ak{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:2px;font-size:9px;color:rgba(255,255,255,.5)}

/* Overlay */
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.95)}
#overlay h1{font-size:50px;color:#fff;letter-spacing:7px;font-weight:800}
#overlay .sub{font-size:14px;color:#e74c3c;letter-spacing:5px;font-weight:700}
#overlay p{font-size:13px;color:rgba(255,255,255,.4);margin-top:6px}
.pbtn{margin-top:22px;padding:12px 44px;font-size:17px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;cursor:pointer;letter-spacing:3px;font-weight:700;border-radius:4px}
.pbtn:hover{transform:scale(1.04)}
</style>
</head>
<body>
<div id="ch"><div class="cx cx-t"></div><div class="cx cx-b"></div><div class="cx cx-l"></div><div class="cx cx-r"></div><div class="cx-d"></div></div>
<div id="dmg"></div><div id="msg"></div><div id="kf"></div>
<div id="vignette" style="position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:7;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.35) 100%)"></div>
<div id="hud-top"><div id="timer">1:40</div><div id="eCount" style="margin-left:16px;background:rgba(0,0,0,.7);color:#f44;padding:5px 14px;border-radius:4px;font-size:16px">敌人: 0</div></div>
<div id="scores"><div class="ts ts-a" id="scA">0</div><span style="color:rgba(255,255,255,.2);padding-top:4px;font-size:18px">:</span><div class="ts ts-d" id="scD">0</div></div>
<div id="hud-bot">
  <div style="display:flex;gap:8px"><div class="hb"><div class="hl">生命</div><div class="hv hv-hp" id="hpV">100</div></div><div class="hb"><div class="hl">护盾</div><div class="hv" style="color:#64b5f6" id="shV">0</div></div></div>
  <div class="hb" style="text-align:center"><div class="hl" id="wpN">经典手枪</div><div style="display:flex;gap:18px;margin-top:2px"><div><div class="hl">弹夹</div><div class="hv hv-am" id="magV">12</div></div><div><div class="hl">备弹</div><div class="hv hv-am" id="resV">36</div></div></div></div>
  <div class="hb"><div class="hl">金币</div><div class="hv hv-cr" id="crV">800</div></div>
</div>
<div id="abilities"></div>
<div id="allyHud" style="position:fixed;top:80px;left:14px;pointer-events:none;z-index:10"></div>
<div id="dirHits" style="position:fixed;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);pointer-events:none;z-index:8"></div>
<div id="plantBar" style="position:fixed;bottom:140px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:15;display:none;text-align:center">
  <div style="color:#ffd740;font-size:13px;letter-spacing:2px;margin-bottom:4px">安装炸弹中...</div>
  <div style="width:180px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden"><div id="plantFill" style="width:0%;height:100%;background:#ffd740;border-radius:3px;transition:width .1s"></div></div>
</div>
<div id="specHud" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:15;display:none;text-align:center">
  <div style="background:rgba(0,0,0,.7);padding:8px 20px;border-radius:6px;border:1px solid rgba(255,255,255,.15)">
    <div style="color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px">👻 观战模式</div>
    <div id="specName" style="color:#fff;font-size:18px;font-weight:700;margin-top:2px"></div>
    <div style="color:rgba(255,255,255,.35);font-size:10px;margin-top:2px">← → 或 鼠标左右键 切换队友</div>
  </div>
</div>

<div id="buyMenu"><div class="bm-inner"><div class="bm-title">武器商店</div><div class="bm-cred">金币: $<span id="bmCr">800</span></div>
  <div class="bm-sec"><div class="bm-sh">手枪</div><div class="bm-g" id="bmPistol"></div></div>
  <div class="bm-sec"><div class="bm-sh">冲锋枪</div><div class="bm-g" id="bmSmg"></div></div>
  <div class="bm-sec"><div class="bm-sh">步枪</div><div class="bm-g" id="bmRifle"></div></div>
  <div class="bm-sec"><div class="bm-sh">重武器</div><div class="bm-g" id="bmHeavy"></div></div>
  <div class="bm-sec"><div class="bm-sh">护盾</div><div class="bm-g" id="bmShield"></div></div>
  <div class="bm-close" style="pointer-events:auto"><button onclick="buyTimer=0;document.getElementById('buyMenu').style.display='none';buyOpen=false;" style="padding:10px 30px;font-size:16px;background:#e74c3c;color:#fff;border:none;cursor:pointer;border-radius:4px;margin-top:8px;letter-spacing:2px">准备就绪</button><br><span style="font-size:11px;color:rgba(255,255,255,.3)">B键 切换商店 | 点击按钮跳过等待</span></div>
</div></div>

<div id="agentSel"><div class="as-t">选择特工</div><div class="as-g" id="asGrid"></div></div>

<div id="overlay">
  <h1>无畏契约</h1><div class="sub">VALORANT</div>
  <p>WASD移动 | 鼠标瞄准 | 左键射击 | R换弹 | B商店</p>
  <p>Q/E/C/X 技能 | 4安装炸弹 | 1-3切换武器 | 空格跳跃</p>
  <button class="pbtn" id="playBtn">单人开始</button>
  <button class="pbtn" id="trainBtn" style="margin-top:10px;background:#2288aa">训练场</button>
  <div style="margin-top:20px;border-top:1px solid rgba(255,255,255,.15);padding-top:16px">
    <div style="color:rgba(255,255,255,.5);font-size:12px;letter-spacing:2px;margin-bottom:10px">联机模式</div>
    <button class="pbtn" id="hostBtn" style="background:#22aa44;margin-right:8px">创建房间</button>
    <button class="pbtn" id="joinBtn" style="background:#2266cc">加入房间</button>
    <div id="roomInfo" style="margin-top:10px;display:none">
      <div id="roomCode" style="color:#ffd740;font-size:24px;letter-spacing:4px;font-weight:700"></div>
      <div style="color:rgba(255,255,255,.4);font-size:11px;margin-top:4px">把房间码发给朋友</div>
      <div id="peerCount" style="color:#3ddc84;font-size:13px;margin-top:6px">等待玩家加入...</div>
      <button class="pbtn" id="mpStartBtn" style="margin-top:10px;background:#e74c3c;display:none">开始游戏</button>
    </div>
    <div id="joinPanel" style="margin-top:10px;display:none">
      <input id="joinInput" type="text" placeholder="输入房间码" style="padding:8px 14px;font-size:16px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:4px;text-align:center;letter-spacing:3px;width:180px">
      <button class="pbtn" id="joinGoBtn" style="margin-left:8px;padding:8px 20px">加入</button>
      <div id="joinStatus" style="color:rgba(255,255,255,.4);font-size:11px;margin-top:6px"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ═══════ AUDIO ═══════
let AC=null;
function initA(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function sfx(t){if(!AC)return;try{const n=AC.currentTime;
if(t==='revolver'){
// 厚重左轮"砰！" - 低频爆破+中频冲击+噪声尾巴+回响
const o1=AC.createOscillator(),g1=AC.createGain();o1.type='sawtooth';o1.frequency.setValueAtTime(180,n);o1.frequency.exponentialRampToValueAtTime(25,n+.5);g1.gain.setValueAtTime(.4,n);g1.gain.exponentialRampToValueAtTime(.001,n+.6);o1.connect(g1);g1.connect(AC.destination);o1.start(n);o1.stop(n+.6);
const o2=AC.createOscillator(),g2=AC.createGain();o2.type='square';o2.frequency.setValueAtTime(400,n);o2.frequency.exponentialRampToValueAtTime(50,n+.2);g2.gain.setValueAtTime(.3,n);g2.gain.exponentialRampToValueAtTime(.001,n+.25);o2.connect(g2);g2.connect(AC.destination);o2.start(n);o2.stop(n+.25);
const buf=AC.createBuffer(1,AC.sampleRate*.5,AC.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);const ns=AC.createBufferSource(),gn=AC.createGain();ns.buffer=buf;gn.gain.setValueAtTime(.15,n);gn.gain.exponentialRampToValueAtTime(.001,n+.5);ns.connect(gn);gn.connect(AC.destination);ns.start(n);ns.stop(n+.5);
// 低频回响尾音
const o3=AC.createOscillator(),g3=AC.createGain();o3.type='sine';o3.frequency.setValueAtTime(60,n+.1);o3.frequency.exponentialRampToValueAtTime(20,n+.7);g3.gain.setValueAtTime(.2,n+.1);g3.gain.exponentialRampToValueAtTime(.001,n+.7);o3.connect(g3);g3.connect(AC.destination);o3.start(n+.1);o3.stop(n+.7);
}
else if(t==='pistol'){const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.setValueAtTime(700,n);o.frequency.exponentialRampToValueAtTime(100,n+.08);g.gain.setValueAtTime(.2,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.1);}
else if(t==='rifle'){const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(500,n);o.frequency.exponentialRampToValueAtTime(60,n+.1);g.gain.setValueAtTime(.18,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.12);}
else if(t==='shotgun'){const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(250,n);o.frequency.exponentialRampToValueAtTime(40,n+.2);g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.25);}
else if(t==='sniper'){const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(350,n);o.frequency.exponentialRampToValueAtTime(30,n+.3);g.gain.setValueAtTime(.35,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.4);}
else if(t==='smg'){const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.setValueAtTime(900,n);o.frequency.exponentialRampToValueAtTime(200,n+.05);g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.06);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.06);}
else if(t==='heavy'){const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(50,n+.15);g.gain.setValueAtTime(.25,n);g.gain.exponentialRampToValueAtTime(.001,n+.18);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.18);}
else if(t==='hit'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=1200;g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.06);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.06);}
else if(t==='hs'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=1500;g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.05);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.05);const o2=AC.createOscillator(),g2=AC.createGain();o2.type='sine';o2.frequency.value=2000;g2.gain.setValueAtTime(.1,n+.05);g2.gain.exponentialRampToValueAtTime(.001,n+.1);o2.connect(g2);g2.connect(AC.destination);o2.start(n+.05);o2.stop(n+.1);}
else if(t==='kill'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(500,n);o.frequency.exponentialRampToValueAtTime(1200,n+.12);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.15);}
else if(t==='hurt'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+.1);g.gain.setValueAtTime(.2,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.12);}
else if(t==='reload'){const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.value=600;g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.03);o.connect(g);g.connect(AC.destination);o.start(n);o.stop(n+.03);const o2=AC.createOscillator(),g2=AC.createGain();o2.type='square';o2.frequency.value=800;g2.gain.setValueAtTime(.06,n+.12);g2.gain.exponentialRampToValueAtTime(.001,n+.15);o2.connect(g2);g2.connect(AC.destination);o2.start(n+.12);o2.stop(n+.15);}
}catch(e){}}

// ═══════ THREE.JS (高画质) ═══════
const scene=new THREE.Scene();
// 阴天清晨(要下雨的感觉)
scene.background=new THREE.Color(0x606a72);
scene.fog=new THREE.FogExp2(0x606a72,.005); // 浓雾

const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,.1,400);
const ren=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:'high-performance'});
ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,1));
ren.shadowMap.enabled=true;ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;  // 电影级色调映射
ren.toneMappingExposure=.85;
ren.outputEncoding=THREE.sRGBEncoding;         // 正确的颜色空间
ren.physicallyCorrectLights=true;
document.body.appendChild(ren.domElement);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});

scene.add(new THREE.AmbientLight(0x667788,.4));
scene.add(new THREE.HemisphereLight(0x778899,0x3a4433,.35));
const sun=new THREE.DirectionalLight(0xccccbb,.6);sun.position.set(30,40,20);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
const sc=sun.shadow.camera;sc.left=sc.bottom=-120;sc.right=sc.top=120;sc.far=250;
scene.add(sun);
const fillLight=new THREE.DirectionalLight(0x8899bb,.3);fillLight.position.set(-30,20,-20);scene.add(fillLight);

// ═══════ PROCEDURAL TEXTURES ═══════
function mkTex(w,h,draw){const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');draw(x,w,h);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}

// 砖墙纹理 (256x256 高清)
const texBrick=mkTex(256,256,(ctx,w,h)=>{
  ctx.fillStyle='#6a5040';ctx.fillRect(0,0,w,h); // 灰泥底色
  const bw=48,bh=22,gap=3;
  for(let row=0;row<h/bh+1;row++){
    const off=row%2?bw/2:0;
    for(let col=-1;col<w/bw+2;col++){
      const r=Math.random();
      // 每块砖随机颜色：红砖/深砖/浅砖
      const br=130+r*50,bg=60+r*40,bb=40+r*25;
      ctx.fillStyle=`rgb(${br|0},${bg|0},${bb|0})`;
      const bx=col*bw+off+gap,by=row*bh+gap;
      ctx.fillRect(bx,by,bw-gap*2,bh-gap*2);
      // 砖面渐变(上亮下暗)
      const grd=ctx.createLinearGradient(bx,by,bx,by+bh-gap*2);
      grd.addColorStop(0,`rgba(255,255,255,.06)`);grd.addColorStop(1,`rgba(0,0,0,.08)`);
      ctx.fillStyle=grd;ctx.fillRect(bx,by,bw-gap*2,bh-gap*2);
      // 砖面颗粒
      for(let i=0;i<12;i++){ctx.fillStyle=`rgba(${Math.random()>0.5?0:200},${Math.random()>0.5?0:120},${Math.random()>0.5?0:80},${Math.random()*.06})`;
        ctx.fillRect(bx+Math.random()*(bw-8),by+Math.random()*(bh-6),2+Math.random()*3,1+Math.random()*2);}
      // 偶尔有裂纹的砖
      if(Math.random()<.08){ctx.strokeStyle=`rgba(40,25,15,.25)`;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(bx+Math.random()*bw*.5,by+2);ctx.lineTo(bx+bw*.3+Math.random()*bw*.4,by+bh-4);ctx.stroke();}
    }
  }
  // 灰泥缝里的细节
  for(let i=0;i<100;i++){ctx.fillStyle=`rgba(80,65,50,${.05+Math.random()*.08})`;ctx.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*2,1);}
});texBrick.repeat.set(3,3);

// 石膏/墙面纹理 (256x256)
const texPlaster=mkTex(256,256,(ctx,w,h)=>{
  // 基底色+渐变
  const grd=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.7);
  grd.addColorStop(0,'#d8ccb0');grd.addColorStop(1,'#c4b898');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
  // 多层噪点
  for(let pass=0;pass<3;pass++){
    const sz=[2,4,8][pass],op=[.04,.03,.02][pass];
    for(let i=0;i<800;i++){const v=Math.random();
      ctx.fillStyle=`rgba(${v>0.5?200:80},${v>0.5?180:60},${v>0.5?140:40},${Math.random()*op})`;
      ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*sz+1,Math.random()*sz+1);}
  }
  // 裂纹网络
  ctx.strokeStyle='rgba(90,70,50,.08)';ctx.lineWidth=.6;
  for(let i=0;i<6;i++){ctx.beginPath();let cx=Math.random()*w,cy=Math.random()*h;ctx.moveTo(cx,cy);
    for(let j=0;j<6;j++){cx+=(Math.random()-.5)*40;cy+=(Math.random()-.5)*40;ctx.lineTo(cx,cy);}ctx.stroke();}
  // 水渍/污迹
  for(let i=0;i<4;i++){ctx.fillStyle=`rgba(100,85,65,${.03+Math.random()*.04})`;
    ctx.beginPath();ctx.ellipse(Math.random()*w,Math.random()*h,5+Math.random()*15,3+Math.random()*8,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();}
});texPlaster.repeat.set(2,2);

// 地砖纹理 (256x256)
const texTile=mkTex(256,256,(ctx,w,h)=>{
  ctx.fillStyle='#7a6a55';ctx.fillRect(0,0,w,h); // 缝隙底色
  const ts=64;
  for(let r=0;r<h/ts;r++)for(let c=0;c<w/ts;c++){
    const v=Math.random()*.15;
    ctx.fillStyle=`rgb(${160+v*60|0},${145+v*50|0},${115+v*40|0})`;
    ctx.fillRect(c*ts+2,r*ts+2,ts-4,ts-4);
    // 砖面光泽渐变
    const tg=ctx.createLinearGradient(c*ts,r*ts,c*ts+ts,r*ts+ts);
    tg.addColorStop(0,'rgba(255,255,255,.04)');tg.addColorStop(.5,'rgba(255,255,255,0)');tg.addColorStop(1,'rgba(0,0,0,.04)');
    ctx.fillStyle=tg;ctx.fillRect(c*ts+2,r*ts+2,ts-4,ts-4);
    // 边缘高光
    ctx.strokeStyle='rgba(200,180,150,.12)';ctx.strokeRect(c*ts+3,r*ts+3,ts-6,ts-6);
    // 颗粒
    for(let i=0;i<8;i++){ctx.fillStyle=`rgba(${80+Math.random()*60},${60+Math.random()*50},${40+Math.random()*40},${Math.random()*.05})`;
      ctx.fillRect(c*ts+4+Math.random()*(ts-8),r*ts+4+Math.random()*(ts-8),1+Math.random()*2,1+Math.random()*2);}
  }
});texTile.repeat.set(4,4);

// 木材纹理 (128x256 高清)
const texWood=mkTex(128,256,(ctx,w,h)=>{
  ctx.fillStyle='#6a4a2a';ctx.fillRect(0,0,w,h);
  // 木纹年轮
  for(let i=0;i<60;i++){
    const y=Math.random()*h;const thick=.5+Math.random()*2;
    const c=Math.random();
    ctx.fillStyle=`rgba(${50+c*40},${28+c*25},${10+c*15},${.1+Math.random()*.2})`;
    // 弯曲木纹
    ctx.beginPath();ctx.moveTo(0,y);
    for(let x=0;x<=w;x+=4){ctx.lineTo(x,y+Math.sin(x*.05+i)*3);}
    ctx.lineTo(w,y+thick);
    for(let x=w;x>=0;x-=4){ctx.lineTo(x,y+thick+Math.sin(x*.05+i)*3);}
    ctx.closePath();ctx.fill();
  }
  // 木节疤
  for(let i=0;i<3;i++){ctx.fillStyle=`rgba(60,35,15,.15)`;
    ctx.beginPath();ctx.ellipse(Math.random()*w,Math.random()*h,4+Math.random()*6,3+Math.random()*4,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();}
});texWood.repeat.set(1,2);

const walls=[];
function bx(w,h,d,mat,x,y,z){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat||mWall);const py=y||h/2;m.position.set(x,py,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);
  if(w>.4&&d>.4&&(py-h/2)<2)walls.push({x,z,hw:w/2+.4,hd:d/2+.4,hh:py+h/2});
  return m;}
const _rayCol=new THREE.Raycaster();
const _rayDirs=[new THREE.Vector3(1,0,0),new THREE.Vector3(-1,0,0),new THREE.Vector3(0,0,1),new THREE.Vector3(0,0,-1)];
const PUSH_DIST=0.6;
let _rayFrame=0;
function pushWalls(p){
  for(const c of walls){const dx=p.x-c.x,dz=p.z-c.z;if(Math.abs(dx)<c.hw&&Math.abs(dz)<c.hd){const ox=c.hw-Math.abs(dx),oz=c.hd-Math.abs(dz);if(ox<oz)p.x+=Math.sign(dx)*(ox+.01);else p.z+=Math.sign(dz)*(oz+.01);}}
  if(!window._mapMeshes||window._mapMeshes.length===0)return;
  // 每帧只检测2个方向，轮流
  _rayFrame++;
  const startIdx=(_rayFrame%2)*2;
  const origin=new THREE.Vector3(p.x,p.y-.5,p.z);
  for(let i=startIdx;i<startIdx+2;i++){
    const dir=_rayDirs[i];
    _rayCol.set(origin,dir);
    _rayCol.far=PUSH_DIST;
    const hits=_rayCol.intersectObjects(window._mapMeshes,false);
    if(hits.length>0){
      const pushBack=PUSH_DIST-hits[0].distance;
      p.x-=dir.x*pushBack;
      p.z-=dir.z*pushBack;
    }
  }
}

// ═══════ CHARACTER BUILDER ═══════
function addP(g,geo,mat,px,py,pz,rx,ry,rz){
  const m=new THREE.Mesh(geo,mat);m.position.set(px,py,pz);
  if(rx)m.rotation.x=rx;if(ry)m.rotation.y=ry;if(rz)m.rotation.z=rz;
  g.add(m);return m;
}
function buildBody(opts){
  const g=new THREE.Group();
  const h=opts.h||1.8;
  const primary=new THREE.MeshStandardMaterial({color:opts.primary,roughness:.55,metalness:.08,envMapIntensity:.6});
  const secondary=new THREE.MeshStandardMaterial({color:opts.secondary||0x333333,roughness:.65,envMapIntensity:.4});
  const dark=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:.75,metalness:.02});

  // ── LEGS ──

  addP(legR,new THREE.CylinderGeometry(.075,.065,h*.18*lm,12),fabric,0,-h*.07*lm,0);

  addP(legL,new THREE.SphereGeometry(.06,8,6),dark,0,-h*.15*lm,-.02);
  addP(legR,new THREE.SphereGeometry(.06,8,6),dark,0,-h*.15*lm,-.02);

  addP(legL,new THREE.SphereGeometry(.045,6,5),accent,0,-h*.15*lm,-.05);

  const bootGeoL=new THREE.BoxGeometry(.14,.05,.22);bootGeoL.translate(0,0,.02);
  const bootGeoR=new THREE.BoxGeometry(.14,.05,.22);bootGeoR.translate(0,0,.02);
  addP(legL,bootGeoL,dark,0,-h*.3*lm,0);
  addP(legR,bootGeoR,dark,0,-h*.3*lm,0);
  // 鞋底纹路
  addP(legL,new THREE.BoxGeometry(.12,.01,.2),leather,0,-h*.315*lm,.02);

  // 腿部口袋
  addP(legL,new THREE.BoxGeometry(.04,.05,.04),dark,-.06,-h*.1*lm,-.02);

  addP(g,new THREE.BoxGeometry(.38,h*.16,.1),primary,0,h*.44,.1);

  // ── HEAD (纹理贴图脸) ──

  fx.fillStyle=skinHex;fx.fillRect(0,0,256,256);
  // 轻微的明暗变化
  const grd=fx.createRadialGradient(128,130,20,128,140,128);
  grd.addColorStop(0,skinHex);grd.addColorStop(1,'rgba(0,0,0,0.15)');
  fx.fillStyle=grd;fx.fillRect(0,0,256,256);

  const oy=20; // 五官整体下移

// ═══════ SHOOTING ═══════
function curW(){return weapons[slot];}

function shoot(){
  if(dimRiftActive)return; // 维度漂移中不能开枪
  const w=curW();if(!w)return;
  if(w.cat==='knife'){
    if(knifeAtk)return; // 动画进行中不重复
    knifeAtk=true;knifeT=0;knifeDmgDone=false;
    return;
  }
  // 风暴之刃激活时→扔飞刀
  if(bladeStorm&&bladeCount>0){
    bladeCount--;
    sfx('hit');
    const bladeDir=new THREE.Vector3(0,0,-1);
    bladeDir.applyAxisAngle(new THREE.Vector3(1,0,0),pitch);
    bladeDir.applyAxisAngle(new THREE.Vector3(0,1,0),yaw);
    // 飞刀模型(菱形风暴之刃)
    const bladeG=new THREE.Group();
    // 刀身(菱形：两个三角拼成)
    const bladeShape=new THREE.Shape();
    bladeShape.moveTo(0,.12);bladeShape.lineTo(.015,0);bladeShape.lineTo(0,-.04);bladeShape.lineTo(-.015,0);bladeShape.lineTo(0,.12);
    const bladeGeo=new THREE.ExtrudeGeometry(bladeShape,{depth:.004,bevelEnabled:false});
    const bladeMesh=new THREE.Mesh(bladeGeo,new THREE.MeshStandardMaterial({color:0xaaeeff,emissive:0x2266aa,roughness:.15,metalness:.7}));
    bladeMesh.position.z=-.002;bladeG.add(bladeMesh);
    // 刀刃边缘发光线
    const edgeL=new THREE.Mesh(new THREE.BoxGeometry(.001,.14,.002),new THREE.MeshBasicMaterial({color:0x66ccff,transparent:true,opacity:.8}));
    edgeL.position.set(.015,.04,0);bladeG.add(edgeL);
    const edgeR=new THREE.Mesh(new THREE.BoxGeometry(.001,.14,.002),new THREE.MeshBasicMaterial({color:0x66ccff,transparent:true,opacity:.8}));
    edgeR.position.set(-.015,.04,0);bladeG.add(edgeR);
    // 中心脊线
    const spine=new THREE.Mesh(new THREE.BoxGeometry(.003,.11,.006),new THREE.MeshStandardMaterial({color:0xccddff,roughness:.1,metalness:.8}));
    spine.position.set(0,.04,0);bladeG.add(spine);
    // 刀柄(短)
    const handle=new THREE.Mesh(new THREE.BoxGeometry(.008,.03,.008),new THREE.MeshStandardMaterial({color:0x334455,roughness:.6}));
    handle.position.set(0,-.05,0);bladeG.add(handle);
    // 护手
    const guard=new THREE.Mesh(new THREE.BoxGeometry(.025,.005,.006),new THREE.MeshStandardMaterial({color:0x5588aa,roughness:.3,metalness:.5}));
    guard.position.set(0,-.035,0);bladeG.add(guard);
    bladeG.position.copy(pos);bladeG.position.y-=.2;
    bladeG.lookAt(pos.clone().add(bladeDir));
    scene.add(bladeG);
    // 即时射线命中判定(精准)
    let bladeTarget=null,bladeDist=999,bladeHS=false;
    for(const e of enemies){
      if(e.dead)continue;
      const h=e.h||1.8;
      const ex=e.mesh.position.x-pos.x,ez=e.mesh.position.z-pos.z;
      const flatD=Math.sqrt(ex*ex+ez*ez);if(flatD<1||flatD>80)continue;
      const toE=new THREE.Vector3(ex,(h*0.45)-pos.y,ez).normalize();
      const toHead=new THREE.Vector3(ex,h*0.6-pos.y,ez).normalize();
      const dot=bladeDir.dot(toE);
      const headDot=bladeDir.dot(toHead);
      const bodyT=Math.cos(Math.atan(0.4/flatD));
      const headT=Math.cos(Math.atan(0.22/flatD));
      const isHS=headDot>Math.max(0.992,Math.min(0.9995,headT));
      const bodyHit=dot>Math.max(0.993,Math.min(0.9998,bodyT));
      if((bodyHit||isHS)&&flatD<bladeDist){bladeDist=flatD;bladeTarget=e;bladeHS=isHS;}
    }
    if(bladeTarget){
      const dmg=bladeHS?150:50;
      bladeTarget.hp-=dmg;sfx(bladeHS?'hs':'hit');
      bladeTarget.mesh.children.forEach(c=>{if(c.material&&c.material.emissive)c.material.emissive.set(0xffffff);});
      setTimeout(()=>{if(bladeTarget.mesh)bladeTarget.mesh.children.forEach(c=>{if(c.material&&c.material.emissive)c.material.emissive.set(0);});},80);
      const ch=document.getElementById('ch');
      if(bladeTarget.hp<=0&&!bladeTarget.dead){
        bladeTarget.dead=true;bladeTarget.deathT=30;kills++;creds+=200;sfx('kill');addKF(bladeTarget.type,bladeHS);
        ultPts=Math.min(ultPts+1,selAgent?AGENTS[selAgent].ab[3].ult:6);updAbHUD();
        if(bladeStorm){bladeCount=Math.min(bladeCount+1,5);showMsg('飞刀回收! '+bladeCount+'/5',1000);}
        ch.className='kill';
      }else ch.className='hit';
      setTimeout(()=>ch.className='',120);
    }
    // 飞刀视觉飞行(纯视觉，命中已判定)
    const bEnd=pos.clone().add(bladeDir.clone().multiplyScalar(bladeTarget?bladeDist:60));
    abFx.push({m:bladeG,t:60,type:'bladeVisual',start:pos.clone(),end:bEnd,prog:0});
    showMsg('飞刀 '+bladeCount+'/5',800);
    // 枪身抖动
    gunG.rotation.x-=.05;gunG.position.z+=.03;
    // 移除手上一把刀
    const bModel=gunG.userData.bladestormModel;
    if(bModel&&bModel.children.length>0)bModel.remove(bModel.children[bModel.children.length-1]);
    if(bladeCount<=0&&!trainingMode){bladeStorm=false;showMsg('风暴之刃结束',1500);buildGun();}
    else if(bladeCount<=0&&trainingMode){bladeCount=5;showMsg('飞刀补满! 5/5',800);}
    return;
  }
  if(w.mag<=0||reloading){if(w.res>0&&!reloading){reloading=true;reloadT=w.reload;sfx('reload');}return;}
  if(!trainingMode)w.mag--;sfx(w.sfx);mfL.intensity=4;
  const isRevolver=w.sfx==='revolver';
  const aimPitch=pitch;
  const aimYaw=yaw;
  gunG.position.z+=isRevolver?.12:.05;
  gunG.position.y+=isRevolver?.06:0;
  gunG.rotation.x-=isRevolver?.12:.03;
  if(isRevolver){pitch+=.035;recoilPitch+=.035;}
  // 连发枪道：先往上，然后左右摆
  if(w.auto){
    sprayCount++;
    if(sprayCount<=6){
      // 前6发：往上抬
      pitch+=.005;recoilPitch+=.005;
    }else{
      // 之后左右摆动
      const swayPhase=(sprayCount-6)*.8;
      const sway=Math.sin(swayPhase)*.004;
      yaw+=sway;sprayYaw+=sway;
    }
  }

  const pellets=w.pellets||1;
  for(let p=0;p<pellets;p++){
    // Full 3D aim direction from yaw + pitch + weapon spread
    const aimDir=new THREE.Vector3(0,0,-1);
    aimDir.applyAxisAngle(new THREE.Vector3(1,0,0),aimPitch);
    aimDir.applyAxisAngle(new THREE.Vector3(0,1,0),aimYaw);
    // 基础散射+移动散射+连射散射
    const mv2=new THREE.Vector3(K['KeyW']||K['KeyS']?1:0,0,K['KeyA']||K['KeyD']?1:0);
    const moving=mv2.length()>.1;
    const sprintNow=K['ShiftLeft']||K['ShiftRight'];
    const moveSpread=moving?(sprintNow?w.spread*2:w.spread*1):0;
    const spraySpread=w.auto?Math.min(sprayCount*.002,.02):0;
    const totalSpread=w.spread*0.5+moveSpread+spraySpread;
    aimDir.x+=(Math.random()-.5)*totalSpread;
    aimDir.y+=(Math.random()-.5)*totalSpread;
    aimDir.normalize();

    let best=null,bestD=999,bestHS=false;
    for(const e of enemies){
      if(e.dead)continue;
      const h=e.h||1.8;
      const ex=e.mesh.position.x-pos.x, ez=e.mesh.position.z-pos.z;
      const flatD=Math.sqrt(ex*ex+ez*ez);
      if(flatD<1||flatD>100)continue;

      // 头部命中检测(独立判定)
      const toHead=new THREE.Vector3(ex, h*0.6-pos.y, ez);
      const headD=toHead.length();
      toHead.normalize();
      const headDot=aimDir.dot(toHead);
      const headRadius=0.15;
      const headThresh=Math.cos(Math.atan(headRadius/headD));
      const isHS=headDot>Math.max(w.pellets?0.97:0.998, Math.min(0.99995,headThresh));

      // 身体命中检测
      const toE=new THREE.Vector3(ex, (h*0.45)-pos.y, ez);
      const d=toE.length();
      toE.normalize();
      const dot=aimDir.dot(toE);
      const bodyRadius=0.18;
      const threshold=Math.cos(Math.atan(bodyRadius/d));
      const minThreshold=w.pellets?0.97:0.999;
      const finalThreshold=Math.max(minThreshold, Math.min(0.99995, threshold));
      const bodyHit=dot>finalThreshold;

      if((bodyHit||isHS)&&flatD<bestD){
        // Check LOS: wall blocking
        let blocked=false;
        for(let t=1;t<flatD;t+=1.5){
          const cx=pos.x+ex/flatD*t, cz=pos.z+ez/flatD*t;
          for(const wl of walls){
            if(Math.abs(cx-wl.x)<wl.hw-.3&&Math.abs(cz-wl.z)<wl.hd-.3){blocked=true;break;}
          }
          if(blocked)break;
        }
        if(!blocked){bestD=flatD;best=e;bestHS=isHS;}
      }
    }
    if(best){
      // Headshot: 100% of HP as damage (instant kill)
      let dmg=bestHS?best.maxHp:w.dmg;
      best.hp-=dmg;
      sfx(bestHS?'hs':'hit');
      best.mesh.children.forEach(c=>{if(c.material&&c.material.emissive)c.material.emissive.set(0xffffff);});
      setTimeout(()=>{if(best.mesh)best.mesh.children.forEach(c=>{if(c.material&&c.material.emissive)c.material.emissive.set(0);});},80);
      const ch=document.getElementById('ch');
      if(best.hp<=0&&!best.dead){
        best.dead=true;best.deathT=30;kills++;creds+=200;
        sfx('kill');addKF(best.type,isHS);
        // 女皇击杀自动回血(不需要吞噬)
        if(empressActive){hp=Math.min(100,hp+50);shield=Math.min(50,shield+25);updHUD();showMsg('女皇 — +50HP +25护甲',800);}
        ultPts=Math.min(ultPts+1,selAgent?AGENTS[selAgent].ab[3].ult:6);
        updAbHUD();
        // Reyna: 击杀后在死亡位置生成灵魂球
        if(selAgent==='reyna'){
          const orbPos=new THREE.Vector3(best.mesh.position.x,1.2,best.mesh.position.z);
          const orb=new THREE.Mesh(new THREE.SphereGeometry(.4,10,8),new THREE.MeshBasicMaterial({color:0xcc44aa,transparent:true,opacity:.7}));
          orb.position.copy(orbPos);scene.add(orb);
          orb.add(new THREE.Mesh(new THREE.SphereGeometry(.6,8,6),new THREE.MeshBasicMaterial({color:0xaa22aa,transparent:true,opacity:.2})));
          abFx.push({m:orb,t:400,type:'soulOrb',radius:5,baseY:1.2});
        }
        ch.className='kill';
      }else ch.className='hit';
      setTimeout(()=>ch.className='',120);
    }
    // 联机：检测是否打中其他玩家
    if(mpMode&&!best){
      const hitId=mpCheckHit(aimDir);
      if(hitId){
        const dmg=w.dmg||20;
        mpBroadcast({type:'hit',target:hitId,dmg:dmg,sfx:w.sfx||'rifle'});
        sfx('hit');
        const ch2=document.getElementById('ch');ch2.className='hit';setTimeout(()=>ch2.className='',120);
      }
    }
    // 找子弹终点(敌人或墙壁)
    let hitDist=best?bestD:80;
    let hitWall=false,hitPos=null,hitNormal=null;
    if(!best){
      // 没打到人，检测打到哪面墙
      for(let t=1;t<80;t+=.5){
        const cx=pos.x+aimDir.x*t,cy=pos.y+aimDir.y*t,cz=pos.z+aimDir.z*t;
        for(const wl of walls){
          if(Math.abs(cx-wl.x)<wl.hw&&Math.abs(cz-wl.z)<wl.hd&&cy>0&&cy<wl.hh*2){
            hitDist=t;hitWall=true;
            hitPos=new THREE.Vector3(cx,cy,cz);
            // 判断打到哪面墙（法线方向）
            const dx=Math.abs(cx-wl.x)/wl.hw,dz=Math.abs(cz-wl.z)/wl.hd;
            if(dx>dz)hitNormal=new THREE.Vector3(cx>wl.x?1:-1,0,0);
            else hitNormal=new THREE.Vector3(0,0,cz>wl.z?1:-1);
            break;
          }
        }
        // 打到地面
        if(!hitWall&&cy<=0){hitDist=t;hitWall=true;hitPos=new THREE.Vector3(cx,0,cz);hitNormal=new THREE.Vector3(0,1,0);break;}
        if(hitWall)break;
      }
    }
    // 曳光弹
    const bulletGeo=new THREE.SphereGeometry(.02,6,4);
    const bulletMat=new THREE.MeshBasicMaterial({color:0xffdd44});
    const bullet=new THREE.Mesh(bulletGeo,bulletMat);
    bullet.position.copy(pos);
    const tailGeo=new THREE.CylinderGeometry(.005,.015,.15,4);
    const tailMat=new THREE.MeshBasicMaterial({color:0xffaa22,transparent:true,opacity:.5});
    const tail=new THREE.Mesh(tailGeo,tailMat);
    tail.rotation.x=Math.PI/2;tail.position.set(0,0,.08);
    bullet.add(tail);
    bullet.lookAt(pos.clone().add(aimDir));
    scene.add(bullet);
    const bEnd=pos.clone().add(aimDir.clone().multiplyScalar(hitDist));
    trails.push({m:bullet,t:30,type:'tracer',start:pos.clone(),end:bEnd,prog:0,hitWall:hitWall,hitPos:hitPos,hitNormal:hitNormal,marked:false});
  }
  if(w.mag<=0&&w.res>0){reloading=true;reloadT=w.reload;sfx('reload');}
  updHUD();
}

// ═══════ ABILITIES ═══════
function useAb(idx){try{
  if(!selAgent||state!=='playing')return;
  const ab=AGENTS[selAgent].ab[idx];if(!ab)return;
  if(idx===3){if(!trainingMode&&ultPts<ab.ult)return;if(!trainingMode)ultPts=0;}
  else{if(ab.ch<=0)return;if(ab.mx<99&&!trainingMode)ab.ch--;}
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const aimDir3=new THREE.Vector3(-Math.sin(yaw),pitch*.5,-Math.cos(yaw)).normalize();
  const sp=pos.clone().add(fwd.clone().multiplyScalar(3));sp.y=Math.max(.5,sp.y);

  // ── 投掷型技能：抛出→飞行→落地触发 ──
  function throwAbility(color,onLand){
    const proj=new THREE.Mesh(new THREE.SphereGeometry(.15,8,6),new THREE.MeshBasicMaterial({color:color}));
    proj.position.copy(pos);proj.position.y-=.2;scene.add(proj);
    const vel=aimDir3.clone().multiplyScalar(30);vel.y+=3;
    // 继承玩家移动速度(走路/跑步扔更远)
    const pFwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const pRight=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    let pSpeed=0;
    if(K['KeyW'])pSpeed=6;if(K['ShiftLeft']||K['ShiftRight'])pSpeed=9;
    if(K['KeyW'])vel.add(pFwd.clone().multiplyScalar(pSpeed));
    if(K['KeyS'])vel.sub(pFwd.clone().multiplyScalar(3));
    if(K['KeyD'])vel.add(pRight.clone().multiplyScalar(3));
    if(K['KeyA'])vel.sub(pRight.clone().multiplyScalar(3));
    // 跳跃中扔→继承向上速度，扔更远
    if(!grounded)vel.y+=vy*.5;
    abFx.push({m:proj,t:200,type:'projectile',vel:vel,onLand:onLand,gravity:true});
  }

  if(ab.type==='leer'){
    // 蕾娜-蛊惑之眼：抛出飘到空中
    throwAbility(0xcc44aa,function(landPos){
      const eyeG=new THREE.Group();
      eyeG.add(new THREE.Mesh(new THREE.SphereGeometry(.5,10,8),new THREE.MeshPhongMaterial({color:0xcc44aa,emissive:0x661133,shininess:80,transparent:true,opacity:.85})));
      const pupil=new THREE.Mesh(new THREE.SphereGeometry(.2,8,6),new THREE.MeshBasicMaterial({color:0x220022}));
      pupil.position.set(0,0,-.4);eyeG.add(pupil);
      eyeG.position.copy(landPos);eyeG.position.y=2.5;scene.add(eyeG);
      abFx.push({m:eyeG,t:500,type:'leer',hp:100,radius:25});
    });
  }else if(ab.type==='curveball'){
    // 不死鸟-弧光闪光：按A→左弯，按D→右弯
    // 用路径弧线而不是速度，100%不会搞混方向
    const proj=new THREE.Mesh(new THREE.SphereGeometry(.15,8,6),new THREE.MeshBasicMaterial({color:0xff8833}));
    proj.position.copy(pos);proj.position.y+=.5;scene.add(proj);
    const p0=pos.clone(); // 起点
    const dist=8; // 飞行距离
    // 右向量 = cross(forward, up)
    const rightV=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
    // 按D→往右弯(+right)，按A或默认→往左弯(-right)
    // 智能检测：左右各检测多个距离，哪边离墙近就是掩体那边，闪光往反方向飞
    const rightV2=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
    let wallDistR=999,wallDistL=999;
    for(let d=0.5;d<=4;d+=0.5){
      const checkR=pos.clone().add(rightV2.clone().multiplyScalar(d));
      const checkL=pos.clone().add(rightV2.clone().multiplyScalar(-d));
      for(const wl of walls){
        if(Math.abs(checkR.x-wl.x)<wl.hw&&Math.abs(checkR.z-wl.z)<wl.hd&&d<wallDistR)wallDistR=d;
        if(Math.abs(checkL.x-wl.x)<wl.hw&&Math.abs(checkL.z-wl.z)<wl.hd&&d<wallDistL)wallDistL=d;
      }
    }
    // 哪边离墙近→掩体在那边→闪光往反方向飞
    // 右边墙近→掩体在右→闪光往左(-1)，左边墙近→掩体在左→闪光往右(+1)
    const side=wallDistR<wallDistL?1:-1;
    // 终点：前方+侧面
    const p2=pos.clone().add(fwd.clone().multiplyScalar(dist)).add(rightV.clone().multiplyScalar(side*dist));
    p2.y=1.5;
    // 中间控制点：主要往前
    const p1=pos.clone().add(fwd.clone().multiplyScalar(dist*.7));
    p1.y=2;
    abFx.push({m:proj,t:80,type:'curveball',p0:p0,p1:p1,p2:p2,time:0,
      onLand:function(landPos){
        const fl=new THREE.Mesh(new THREE.SphereGeometry(.5,8,8),new THREE.MeshBasicMaterial({color:0xffffff}));
        fl.position.copy(landPos);fl.position.y=1.5;scene.add(fl);
        abFx.push({m:fl,t:15,type:'flash'});
        sfx('hit');
        enemies.forEach(e=>{if(!e.dead&&e.mesh.position.distanceTo(landPos)<15)e.fireT+=4;});
      }
    });
  }else if(ab.type==='flash'){
    // 普通闪光弹：抛出→落地爆炸致盲
    throwAbility(0xffffaa,function(landPos){
      const fl=new THREE.Mesh(new THREE.SphereGeometry(.5,8,8),new THREE.MeshBasicMaterial({color:0xffffff}));
      fl.position.copy(landPos);fl.position.y=1;scene.add(fl);
      abFx.push({m:fl,t:15,type:'flash'});
      sfx('hit');
      enemies.forEach(e=>{if(!e.dead&&e.mesh.position.distanceTo(landPos)<15)e.fireT+=4;});
    });
  }else if(ab.type==='molly'||ab.type==='acid'){
    // 燃烧瓶/酸液：抛出→落地燃烧区
    const c=ab.type==='molly'?0xff4400:0x00ff44;
    throwAbility(c,function(landPos){
      const z=new THREE.Mesh(new THREE.CylinderGeometry(3,3,.3,12),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.4}));
      z.position.copy(landPos);z.position.y=.15;scene.add(z);
      abFx.push({m:z,t:300,type:'zone',radius:3,dmg:40});
      sfx('hit');
    });
  }else if(ab.type==='wall'||ab.type==='toxwall'){
    // 火墙/毒墙：沿视角方向从脚前延伸出去，像地面上画一条线
    const c=ab.type==='wall'?0xff4400:0x00ff44;
    const wallLen=14;
    const wallStart=pos.clone().add(fwd.clone().multiplyScalar(2));
    const wallEnd=pos.clone().add(fwd.clone().multiplyScalar(2+wallLen));
    const wallMid=wallStart.clone().add(wallEnd).multiplyScalar(.5);
    const wl=new THREE.Mesh(new THREE.BoxGeometry(.15,4,wallLen),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.5}));
    wl.position.copy(wallMid);wl.position.y=0;wl.rotation.y=yaw;scene.add(wl);
    abFx.push({m:wl,t:400,type:'vblock',rising:true,targetY:2});
    sfx('hit');
  }else if(ab.type==='smoke'||ab.type==='poison'){
    // 烟雾：抛出→落地展开
    const c=ab.type==='smoke'?0xaaaacc:0x22aa22;
    throwAbility(c,function(landPos){
      const sm=new THREE.Mesh(new THREE.SphereGeometry(3,10,8),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.35}));
      sm.position.copy(landPos);sm.position.y=2;sm.scale.set(.1,.1,.1);scene.add(sm);
      abFx.push({m:sm,t:350,type:'smoke',expanding:true});
    });
  }else if(ab.type==='heal'){
    // 贤者-治疗宝珠：持续回血(5秒回60)
    showMsg('治疗中...',3000);
    let healed=0;
    const healInt=setInterval(()=>{
      if(healed>=60||hp>=100){clearInterval(healInt);return;}
      hp=Math.min(100,hp+4);healed+=4;updHUD();
    },250);
    const rn=new THREE.Mesh(new THREE.TorusGeometry(1.5,.08,6,16),new THREE.MeshBasicMaterial({color:0x44ddaa,transparent:true,opacity:.6}));
    rn.position.copy(pos);rn.position.y=.5;rn.rotation.x=Math.PI/2;scene.add(rn);
    abFx.push({m:rn,t:80,type:'healfx'});
  }else if(ab.type==='barrier'){
    // 贤者-屏障：从地面升起
    const br=new THREE.Mesh(new THREE.BoxGeometry(8,4,1),new THREE.MeshStandardMaterial({color:0x44ddaa,transparent:true,opacity:.6}));
    br.position.copy(sp);br.position.y=0;br.rotation.y=yaw;br.castShadow=true;scene.add(br);
    abFx.push({m:br,t:500,type:'barrier',rising:true,targetY:2});
    sfx('hit');
  }else if(ab.type==='quake'){
    // 裂变-断层线：前方依次地裂
    const fwd2=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    for(let i=1;i<=5;i++){
      setTimeout(()=>{
        const qp=pos.clone().add(fwd2.clone().multiplyScalar(i*3.5));qp.y=.15;
        const qz=new THREE.Mesh(new THREE.CylinderGeometry(2,2,.3,10),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:.35}));
        qz.position.copy(qp);scene.add(qz);abFx.push({m:qz,t:180,type:'zone',radius:2,dmg:20});
        sfx('hit');
        enemies.forEach(e=>{if(!e.dead&&e.mesh.position.distanceTo(qp)<3)e.fireT+=2;});
      },i*100);
    }
  }else if(ab.type==='slow'){
    // 贤者-减速宝珠：抛出→落地展开冰面
    throwAbility(0x88ccff,function(landPos){
      const sl=new THREE.Mesh(new THREE.CylinderGeometry(4,4,.2,12),new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:.3}));
      sl.position.copy(landPos);sl.position.y=.1;sl.scale.set(.1,.1,.1);scene.add(sl);
      abFx.push({m:sl,t:350,type:'slow',radius:4,expanding:true});
      sfx('hit');
    });
  }else if(ab.type==='updraft'){
    // 疾风-升空气流
    vy=14;grounded=false;sfx('hit');
  }else if(ab.type==='dash'){
    // 疾风-疾风冲刺：朝瞄准方向冲
    sliding=true;slideTimer=.4;slideCd=0;
    slideDir.copy(fwd).normalize();
    window._dashBoost=.4;sfx('hit');
  }
  else if(ab.type==='devour'){
    // 蕾娜-吞噬
    let nearOrb=null,nearOD=999;
    for(const fx of abFx){if(fx.type==='soulOrb'){const od=pos.distanceTo(fx.m.position);if(od<(fx.radius||5)&&od<nearOD){nearOD=od;nearOrb=fx;}}}
    if(nearOrb){hp=Math.min(100,hp+50);updHUD();sfx('hit');showMsg('吞噬 — 回复50HP!',1500);nearOrb.t=1;
      const hfx=new THREE.Mesh(new THREE.TorusGeometry(1.2,.06,6,12),new THREE.MeshBasicMaterial({color:0xcc44aa,transparent:true,opacity:.6}));
      hfx.position.copy(pos);hfx.position.y=.5;hfx.rotation.x=Math.PI/2;scene.add(hfx);abFx.push({m:hfx,t:40,type:'healfx'});
    }else{showMsg('附近没有灵魂球',1000);ab.ch++;}
    return;
  }
  else if(ab.type==='speed'){
    // 蕾娜-解离：加速+半透明
    if(!window._speedBoost)window._speedBoost=0;
    window._speedBoost=1.5;
    showMsg('解离 — 加速!',1500);sfx('hit');
    const fx2=new THREE.Mesh(new THREE.TorusGeometry(1.2,.06,6,12),new THREE.MeshBasicMaterial({color:0xcc44aa,transparent:true,opacity:.5}));
    fx2.position.copy(pos);fx2.position.y=.5;fx2.rotation.x=Math.PI/2;scene.add(fx2);abFx.push({m:fx2,t:40,type:'healfx'});
  }
  else if(ab.type==='runback'){
    // 不死鸟-涅槃重生：标记当前位置，10秒内死亡或时间到回到标记点满血复活
    runbackActive=true;
    runbackPos=pos.clone();
    runbackHp=hp;
    runbackTimer=10;
    showMsg('涅槃重生! 10秒后回到此处',2000);
    sfx('hit');
    // 标记点特效
    const mark=new THREE.Mesh(new THREE.CylinderGeometry(1,1,.1,12),new THREE.MeshBasicMaterial({color:0xff6622,transparent:true,opacity:.5}));
    mark.position.copy(pos);mark.position.y=.05;scene.add(mark);
    abFx.push({m:mark,t:600,type:'runbackMark'});
  }
  else if(ab.type==='empress'){
    // 蕾娜-女皇：加速+射速提升+击杀回血，持续8秒
    empressActive=true;empressTimer=8;
    showMsg('女皇! 射速提升+击杀自动回血',2000);
    sfx('hit');
    // 紫色光环
    const aura=new THREE.Mesh(new THREE.CylinderGeometry(2,2,.1,16),new THREE.MeshBasicMaterial({color:0xcc44aa,transparent:true,opacity:.3}));
    aura.position.copy(pos);aura.position.y=.05;scene.add(aura);
    abFx.push({m:aura,t:480,type:'healfx'});
  }
  else if(ab.type==='resurrect'){
    // 贤者-复活术：复活最近死亡的队友
    let deadAlly=null,nearD=999;
    for(const al of allies){
      if(al.dead&&!al.gone){
        const d=pos.distanceTo(al.mesh.position);
        if(d<8&&d<nearD){nearD=d;deadAlly=al;}
      }
    }
    if(deadAlly){
      deadAlly.dead=false;deadAlly.hp=deadAlly.maxHp||100;deadAlly.deathT=0;
      deadAlly.mesh.position.y=0;deadAlly.mesh.rotation.x=0;
      showMsg('复活术! 队友已复活',2000);
      sfx('hit');
      // 复活特效
      const res=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,4,12),new THREE.MeshBasicMaterial({color:0x44ddaa,transparent:true,opacity:.3}));
      res.position.copy(deadAlly.mesh.position);res.position.y=2;scene.add(res);
      abFx.push({m:res,t:60,type:'healfx'});
    }else{
      showMsg('附近没有可复活的队友',1500);
      if(!trainingMode){ultPts=AGENTS[selAgent].ab[3].ult;} // 退回大招点数
    }
    updAbHUD();
  }
  else if(ab.type==='bladestorm'){
    // 疾风-风暴之刃：拔出5把飞刀
    bladeStorm=true;bladeCount=5;
    showMsg('风暴之刃! 左键投掷飞刀 ('+bladeCount+'/5)',2000);
    sfx('hit');

function updHUD(){

  document.getElementById('hpV').textContent=Math.ceil(hp);
  document.getElementById('hpV').style.color=hp>60?'#3ddc84':hp>30?'#ffa040':'#f44';
  document.getElementById('shV').textContent=Math.ceil(shield);
  document.getElementById('crV').textContent=creds;
  document.getElementById('magV').textContent=reloading?'...':(w?w.mag:'--');
  document.getElementById('resV').textContent=w?w.res||0:'--';
  document.getElementById('wpN').textContent=w?w.n:'小刀';
  document.getElementById('scA').textContent=atkSc;
  document.getElementById('scD').textContent=defSc;
  document.getElementById('eCount').textContent='敌人: '+enemies.filter(e=>!e.dead).length+'/'+enemies.length;
  // Ally HUD
  const ah=document.getElementById('allyHud');ah.innerHTML='';
  for(const al of allies){
    const pct=Math.max(0,Math.ceil(al.hp/al.maxHp*100));
    const col=al.dead?'#666':pct>60?'#3ddc84':pct>30?'#ffa040':'#f44';
    ah.innerHTML+=`<div style="background:rgba(10,10,20,.8);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:4px;margin-bottom:3px;display:flex;align-items:center;gap:8px;min-width:130px">
      <span style="color:#${al.color.toString(16).padStart(6,'0')};font-size:11px;font-weight:700">${al.name}</span>
      <div style="flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;min-width:50px"><div style="width:${al.dead?0:pct}%;height:100%;background:${col};border-radius:2px;transition:width .2s"></div></div>
      <span style="color:${col};font-size:10px;font-weight:700">${al.dead?'☠':''+Math.ceil(al.hp)}</span>
    </div>`;
  }
}

  AGENTS[selAgent].ab.forEach((a,i)=>{
    const d=document.createElement('div');
    const isU=i===3,rdy=isU?ultPts>=a.ult:a.ch>0;

// Directional sound indicator — shows where enemy gunfire is coming from
function showDirInd(ex,ez){
  // Calculate angle from player to enemy relative to player's facing direction
  const dx=ex-pos.x,dz=ez-pos.z;
  const worldAngle=Math.atan2(dx,dz);
  let relAngle=worldAngle-yaw;
  while(relAngle>Math.PI)relAngle-=Math.PI*2;
  while(relAngle<-Math.PI)relAngle+=Math.PI*2;

  const container=document.getElementById('dirHits');
  const ind=document.createElement('div');
  ind.className='dir-ind';
  // Position on a circle around crosshair
  const radius=90;
  const cx=100+Math.sin(relAngle)*radius-3;
  const cy=100-Math.cos(relAngle)*radius-18;
  ind.style.left=cx+'px';ind.style.top=cy+'px';
  // Rotate to point inward
  ind.style.transform='rotate('+(relAngle*180/Math.PI)+'deg)';
  ind.style.opacity='1';
  container.appendChild(ind);
  setTimeout(()=>{ind.style.opacity='0';setTimeout(()=>ind.remove(),300);},800);
}
function fmtTime(s){const m=Math.floor(s/60),se=Math.floor(s%60);return m+':'+se.toString().padStart(2,'0');}

// ═══════ BUY MENU ═══════
function buildBuy(){
  const cats={pistol:'bmPistol',smg:'bmSmg',rifle:'bmRifle',heavy:'bmHeavy'};
  for(const k in cats)document.getElementById(cats[k]).innerHTML='';
  for(const gk in GUNS){
    const g=GUNS[gk];
    const own=weapons.some(w=>w&&w.n===g.n);
    const ok=creds>=g.cost;
    const el=document.createElement('div');
    el.className='bm-i'+(own?' own':'')+(!ok&&!own?' nope':'');
    el.innerHTML=`<span class="bm-n">${g.n}</span><span class="bm-p">${g.cost?'$'+g.cost:'免费'}</span>`;
    el.addEventListener('click',()=>{
      if(own||!ok)return;if(!trainingMode)creds-=g.cost;
      const wd={...g,maxMag:g.mag};
      if(g.cat==='pistol')weapons[0]=wd;else weapons[1]=wd;
      buildBuy();buildGun();updHUD();
    });
    const cid=cats[g.cat];if(cid)document.getElementById(cid).appendChild(el);
  }
  const sd=document.getElementById('bmShield');sd.innerHTML='';
  for(const sk in SHIELDS){
    const s=SHIELDS[sk];const ok=creds>=s.cost;
    const el=document.createElement('div');
    el.className='bm-i'+(shield>=s.val?' own':'')+(!ok&&shield<s.val?' nope':'');
    el.innerHTML=`<span class="bm-n">${s.n}</span><span class="bm-p">$${s.cost}</span>`;
    el.addEventListener('click',()=>{if(shield>=s.val||!ok)return;if(!trainingMode)creds-=s.cost;shield=s.val;updHUD();buildBuy();});
    sd.appendChild(el);
  }
  document.getElementById('bmCr').textContent=creds;
}

function startGame(){

  atkSc=0;defSc=0;roundN=0;creds=4500;kills=0;ultPts=0;
  showAgentSel();
}

function showAgentSel(){
  state='agentSel';
  const g=document.getElementById('asGrid');g.innerHTML='';
  for(const ak in AGENTS){
    const a=AGENTS[ak];const c=document.createElement('div');c.className='as-c';
    c.innerHTML=`<div class="as-ic">${a.icon}</div><div class="as-nm">${a.name}</div><div class="as-rl">${a.role}</div><div class="as-ab">${a.ab.map(b=>`<span class="as-ak">${b.k}</span>`).join('')}</div>`;
    c.addEventListener('click',()=>{
      selAgent=ak;a.ab.forEach(b=>{b.ch=b.mx;});
      document.getElementById('agentSel').style.display='none';
      if(trainingMode)startTrainRound();else startRound();
    });
    g.appendChild(c);
  }
  document.getElementById('agentSel').style.display='flex';
}

function startRound(){
  roundN++;hp=100;roundTimer=roundT;playerDead=false;spectateIdx=0;
  document.getElementById('specHud').style.display='none';
  document.getElementById('ch').style.display='block';

// 创建远程玩家模型
function createRemotePlayer(id){
  const cfg={primary:0x3366cc,secondary:0x112244,accent:0x44aaff,eyeColor:0x44aaff,skin:0xc4a882,h:3,gunType:'rifle'};
  const mesh=buildBody(cfg);
  mesh.scale.set(0.6,0.6,0.6);
  scene.add(mesh);
  // 名字标签
  const canvas=document.createElement('canvas');canvas.width=256;canvas.height=64;
  const ctx=canvas.getContext('2d');ctx.fillStyle='#44aaff';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
  ctx.fillText(id.substr(0,5),128,40);
  const tex=new THREE.CanvasTexture(canvas);
  const label=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  label.scale.set(2,.5,1);label.position.y=2.5;mesh.add(label);
  mpPlayers[id]={mesh:mesh,pos:{x:0,y:0,z:0},yaw:0,pitch:0,hp:100,lastUpdate:Date.now()};
  return mpPlayers[id];
}

// 移除远程玩家
function removeRemotePlayer(id){
  if(mpPlayers[id]){scene.remove(mpPlayers[id].mesh);delete mpPlayers[id];}
}

// 处理收到的数据
function handleMPData(id,data){
  if(data.type==='state'){
    if(!mpPlayers[id]) createRemotePlayer(id);
    const p=mpPlayers[id];
    p.pos=data.pos;p.yaw=data.yaw;p.pitch=data.pitch;p.hp=data.hp;
    p.weapon=data.weapon;p.lastUpdate=Date.now();
  }else if(data.type==='shoot'){
    if(!mpPlayers[id])return;
    // 播放射击音效
    sfx(data.sfx||'rifle');
    // 检测是否打中本地玩家
    if(data.hitId===mpMyId){
      hp-=data.dmg||20;
      document.getElementById('dmg').style.opacity=1;setTimeout(()=>{document.getElementById('dmg').style.opacity=0;},100);
      if(hp<=0){hp=0;playerDead=true;}
    }
  }else if(data.type==='hit'){
    // 被打中
    if(data.target===mpMyId){
      hp-=data.dmg||20;
      document.getElementById('dmg').style.opacity=1;setTimeout(()=>{document.getElementById('dmg').style.opacity=0;},100);
      if(hp<=0){hp=0;}
    }
  }else if(data.type==='join'){
    if(!mpPlayers[id]) createRemotePlayer(id);
  }else if(data.type==='leave'){
    removeRemotePlayer(id);
  }
}

// 发送数据给所有连接
function mpBroadcast(data){
  for(const conn of mpConns){
    try{if(conn.open)conn.send(data);}catch(e){}
  }
}

// 同步本地玩家状态
function mpSyncState(){
  const data={type:'state',pos:{x:pos.x,y:pos.y,z:pos.z},yaw:yaw,pitch:pitch,hp:hp,
    weapon:curW()?curW().n:'',id:mpMyId};
  mpBroadcast(data);
}

// 联机射击命中检测
function mpCheckHit(aimDir){
  let bestD=Infinity,bestId=null;
  for(const[id,p] of Object.entries(mpPlayers)){
    if(p.hp<=0)continue;
    const dx=p.pos.x-pos.x,dz=p.pos.z-pos.z,dy=p.pos.y-pos.y;
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<1||d>100)continue;
    const toP=new THREE.Vector3(dx,dy,dz).normalize();
    const dot=aimDir.dot(toP);
    if(dot>0.98&&d<bestD){bestD=d;bestId=id;}
  }
  return bestId;
}

// 更新远程玩家模型位置
function mpUpdatePlayers(){
  const now=Date.now();
  for(const[id,p] of Object.entries(mpPlayers)){
    // 超过5秒没更新=断线
    if(now-p.lastUpdate>5000){removeRemotePlayer(id);continue;}
    // 平滑插值位置
    p.mesh.position.x+=(p.pos.x-p.mesh.position.x)*.2;
    p.mesh.position.y+=((p.pos.y-1.7)-p.mesh.position.y)*.2;
    p.mesh.position.z+=(p.pos.z-p.mesh.position.z)*.2;
    p.mesh.rotation.y=p.yaw+Math.PI;
  }
}

const clock=new THREE.Clock();let fireAcc=0;let semiCD=0;let recoilPitch=0;let knifeAtk=false,knifeT=0,knifeDmgDone=false;let sprayCount=0,sprayYaw=0;
let bladeStorm=false,bladeCount=0;

// Stuck detection + wall avoidance for AI
function aiMove(p,tx,tz,spd,dt,stuckData){
  const dx=tx-p.x,dz=tz-p.z;
  const d=Math.sqrt(dx*dx+dz*dz);
  if(d<.5)return;
  // Desired direction
  let mx=dx/d,mz=dz/d;

  // Check if wall ahead (probe 1.5 units forward)
  const probeD=1.5;
  let wallAhead=false;
  for(const wl of walls){
    if(Math.abs(p.x+mx*probeD-wl.x)<wl.hw&&Math.abs(p.z+mz*probeD-wl.z)<wl.hd){wallAhead=true;break;}
  }

  if(wallAhead){
    // Try sliding along wall: test left and right perpendicular
    const lx=-mz,lz=mx; // left perp
    const rx=mz,rz=-mx;  // right perp
    let leftOk=true,rightOk=true;
    for(const wl of walls){
      if(Math.abs(p.x+lx*probeD-wl.x)<wl.hw&&Math.abs(p.z+lz*probeD-wl.z)<wl.hd)leftOk=false;
      if(Math.abs(p.x+rx*probeD-wl.x)<wl.hw&&Math.abs(p.z+rz*probeD-wl.z)<wl.hd)rightOk=false;
    }
    if(leftOk&&rightOk){
      // Both ok, pick one based on stuckData to be consistent
      if(stuckData.avoidDir===0)stuckData.avoidDir=Math.random()>.5?1:-1;
      mx=stuckData.avoidDir>0?lx:rx;mz=stuckData.avoidDir>0?lz:rz;
    }else if(leftOk){mx=lx;mz=lz;stuckData.avoidDir=1;}
    else if(rightOk){mx=rx;mz=rz;stuckData.avoidDir=-1;}
    else{
      // Both blocked, try backwards + sideways
      mx=-dx/d+lx*.5;mz=-dz/d+lz*.5;
      const ml=Math.sqrt(mx*mx+mz*mz);if(ml>.01){mx/=ml;mz/=ml;}
    }
    stuckData.stuckT=(stuckData.stuckT||0)+dt;
    // If stuck too long, pick new random offset
    if(stuckData.stuckT>3){stuckData.stuckT=0;stuckData.avoidDir=0;}
  }else{
    stuckData.stuckT=0;stuckData.avoidDir=0;
  }

  p.x+=mx*spd*dt;
  p.z+=mz*spd*dt;
}

// Footprint system
const fpGeo=new THREE.PlaneGeometry(.18,.3);
const fpMat=new THREE.MeshBasicMaterial({color:0x333322,transparent:true,opacity:.15,depthWrite:false});
const footprints=[];const MAX_FP=120;
function addFootprint(x,z,angle,isLeft){
  const fp=new THREE.Mesh(fpGeo,fpMat.clone());
  fp.rotation.x=-Math.PI/2;fp.rotation.z=angle+(isLeft?.1:-.1);
  fp.position.set(x+(isLeft?Math.cos(angle)*.12:-Math.cos(angle)*.12),.015,z+(isLeft?-Math.sin(angle)*.12:Math.sin(angle)*.12));
  scene.add(fp);footprints.push({m:fp,life:8});
  // 超过上限删最旧的
  if(footprints.length>MAX_FP){const old=footprints.shift();scene.remove(old.m);}
}
function updateFootprints(dt){
  for(let i=footprints.length-1;i>=0;i--){
    footprints[i].life-=dt;
    footprints[i].m.material.opacity=Math.max(0,footprints[i].life/8*.15);
    if(footprints[i].life<=0){scene.remove(footprints[i].m);footprints.splice(i,1);}
  }
}

// Walk animation for character meshes
function animLegs(mesh,speed,dt){
  const ud=mesh.userData;if(!ud.legL||!ud.legR)return;
  if(speed>.1){
    ud.legPhase+=dt*speed*1.8;
    const swing=Math.sin(ud.legPhase)*.6;
    ud.legL.rotation.x=swing;
    ud.legR.rotation.x=-swing;
    if(ud.armL)ud.armL.rotation.x=-swing*.5;
    // 身体微晃(走路时自然晃动)
    mesh.rotation.z=Math.sin(ud.legPhase)*.015;
    mesh.position.y=Math.abs(Math.cos(ud.legPhase))*.03;
    // 上半身微微前后摆动(枪跟着晃)
    mesh.rotation.x=Math.sin(ud.legPhase*2)*.008;
  }else{
    ud.legL.rotation.x*=.85;
    ud.legR.rotation.x*=.85;
    if(ud.armL)ud.armL.rotation.x*=.85;
    mesh.rotation.z*=.9;
    mesh.rotation.x*=.9;
    mesh.position.y*=.9;
  }
}

function loop(){
  requestAnimationFrame(loop);
  try{
  const dt=Math.min(clock.getDelta(),.04);

  if(state==='buy'){
    // Buy phase: countdown, player can look around but no shooting/movement
    buyTimer-=dt;
    document.getElementById('timer').textContent='购买 '+Math.ceil(Math.max(0,buyTimer));
    camera.position.copy(pos);camera.rotation.set(0,0,0);camera.rotateY(yaw);camera.rotateX(pitch);
    if(buyTimer<=0){
      state='playing';buyOpen=false;
      document.getElementById('buyMenu').style.display='none';
      showMsg('开始!',1500);
    }
    updHUD();
    ren.render(scene,camera);return;
  }
  if(state!=='playing'){
    if(state==='menu'||state==='end'){camera.position.set(0,8,20);camera.lookAt(0,0,-10);}
    ren.render(scene,camera);return;
  }

  // Player
  if(playerDead){
    // Spectate: follow alive ally
    const aliveAllies=allies.filter(a=>!a.dead);
    if(aliveAllies.length===0){winRound('def');return;}
    spectateIdx=spectateIdx%aliveAllies.length;
    const specAlly=aliveAllies[spectateIdx];

  if(spikePlanted){spikeTimer-=dt;if(spikeTimer<=0){showMsg('炸弹引爆!',2000);winRound('atk');return;}}

  // Enemies
  for(const e of enemies){

        }
        // Trail (轻微偏移，不是完美直线)
        const end=nearE.mesh.position.clone();end.y=1.2;end.x+=(Math.random()-.5)*.5;end.z+=(Math.random()-.5)*.5;
        const start=al.mesh.position.clone();start.y=1.2;
        const tg=new THREE.BufferGeometry().setFromPoints([start,end]);
        const tm=new THREE.LineBasicMaterial({color:0x44aaff,transparent:true,opacity:.3});
        const tl=new THREE.Line(tg,tm);scene.add(tl);trails.push({m:tl,t:4});
      }
    }else if(nearE&&nearD<40&&!nearLOS){
      // ═══ ENEMY NEARBY BUT BEHIND WALL → peek/reposition ═══
      al.peekT-=dt;
      if(al.peekT<=0){
        // 尝试侧移找视角
        const perpX2=-(nearE.mesh.position.z-al.mesh.position.z)/nearD;
        const perpZ2=(nearE.mesh.position.x-al.mesh.position.x)/nearD;
        al.mesh.position.x+=perpX2*al.strafeDir*al.speed*dt;
        al.mesh.position.z+=perpZ2*al.strafeDir*al.speed*dt;
        // 偶尔换方向
        if(Math.random()<.02)al.strafeDir*=-1;
      }
      // 面朝敌人方向
      const ta2=Math.atan2(-(nearE.mesh.position.x-al.mesh.position.x),-(nearE.mesh.position.z-al.mesh.position.z));
      let df2=ta2-al.mesh.rotation.y;while(df2>Math.PI)df2-=Math.PI*2;while(df2<-Math.PI)df2+=Math.PI*2;
      al.mesh.rotation.y+=df2*4*dt;
    }else{
      // ═══ NO ENEMY → move to goal (human-like movement) ═══
      const gx=al.goalPos.x-al.mesh.position.x,gz=al.goalPos.z-al.mesh.position.z;
      const gDist=Math.sqrt(gx*gx+gz*gz);
      if(gDist>3){
        al.wobble+=dt*2.5;
        const moveSpd=gDist>20?al.speed:al.speed*.6;
        aiMove(al.mesh.position,al.goalPos.x,al.goalPos.z,moveSpd,dt,al.stuck);
        // 面朝行进方向，偶尔左右看
        const ngx=al.goalPos.x-al.mesh.position.x,ngz=al.goalPos.z-al.mesh.position.z;
        const ga=Math.atan2(-ngx,-ngz)+Math.sin(al.wobble*.7)*.15;
        let gf=ga-al.mesh.rotation.y;while(gf>Math.PI)gf-=Math.PI*2;while(gf<-Math.PI)gf+=Math.PI*2;
        al.mesh.rotation.y+=gf*4*dt;
      }else{
        al.reachedGoal=true;
        // 到达后：像真人一样左右架枪巡视
        al.idleYaw+=al.idleDir*1.2*dt;
        if(Math.abs(al.idleYaw)>1.2){al.idleDir*=-1;al.idleYaw=Math.sign(al.idleYaw)*1.2;}
        // 偶尔停顿换方向
        if(Math.random()<.005)al.idleDir*=-1;
        al.mesh.rotation.y+=al.idleDir*.8*dt;
      }
    }
    al.mesh.position.x=Math.max(-MW+1,Math.min(MW-1,al.mesh.position.x));
    al.mesh.position.z=Math.max(-MD+1,Math.min(MD-1,al.mesh.position.z));
    pushWalls(al.mesh.position);
    // Animate legs: faster when in combat or moving to goal, slow when idle
    const alMoving=(nearE&&nearD<40)?al.speed:(al.reachedGoal?0:al.speed);
    animLegs(al.mesh,alMoving,dt);
    const adx2=al.mesh.position.x-al.lastFpX,adz2=al.mesh.position.z-al.lastFpZ;
    if(adx2*adx2+adz2*adz2>4){addFootprint(al.mesh.position.x,al.mesh.position.z,al.mesh.rotation.y,al.fpLeft);al.fpLeft=!al.fpLeft;al.lastFpX=al.mesh.position.x;al.lastFpZ=al.mesh.position.z;}
  }
  for(let i=allies.length-1;i>=0;i--)if(allies[i].gone)allies.splice(i,1);

  // Round end check: all enemies dead = win
  const alive=enemies.filter(e=>!e.dead).length;
  if(alive===0 && enemies.length>0 && enemies.every(e=>e.dead||e.gone)){
    if(trainingMode){
      // 训练场：假人全死后重生
      enemies.forEach(e=>scene.remove(e.mesh));enemies.length=0;
      for(let i=0;i<8;i++){
        const x=-20+i*5,z=-15-Math.random()*10;
        mkEnemy(x,z,'normal');
        const e=enemies[enemies.length-1];
        e.speed=0;e.fireT=9999;e.dmg=0;e.state='patrol';e.alertT=0;
      }
      creds=99999;updHUD();
      showMsg('假人已重生!',1500);
    }else{winRound('atk');}
    return;
  }

  // Enemy bullets
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];b.m.position.addScaledVector(b.v,dt);b.t--;
    // Wall collision: destroy bullet if inside a wall
    let bHitWall=false;
    for(const wl of walls){if(Math.abs(b.m.position.x-wl.x)<wl.hw-.3&&Math.abs(b.m.position.z-wl.z)<wl.hd-.3){bHitWall=true;break;}}
    if(bHitWall){scene.remove(b.m);eBullets.splice(i,1);continue;}
    // Hit allies
    let hitAlly=false;
    for(const al of allies){
      if(al.dead)continue;
      if(b.m.position.distanceTo(al.mesh.position)<1.2){
        al.hp-=b.dmg;
        al.mesh.children.forEach(c=>{if(c.material&&c.material.emissive)c.material.emissive.set(0xff4444);});
        setTimeout(()=>{if(al.mesh)al.mesh.children.forEach(c=>{if(c.material&&c.material.emissive)c.material.emissive.set(0);});},80);
        if(al.hp<=0){al.dead=true;al.deathT=30;showMsg(al.name+' 阵亡',1500);
          if(playerDead&&allies.filter(a=>!a.dead).length===0){winRound('def');return;}}
        scene.remove(b.m);eBullets.splice(i,1);hitAlly=true;updHUD();break;
      }
    }
    if(hitAlly)continue;
    if(b.m.position.distanceTo(pos)<1){
      let dmg=b.dmg;if(shield>0){const ab=Math.min(shield,dmg*.6);shield-=ab;dmg-=ab;}
      hp-=dmg;sfx('hurt');
      document.getElementById('dmg').style.opacity='.4';setTimeout(()=>document.getElementById('dmg').style.opacity='0',120);
      scene.remove(b.m);eBullets.splice(i,1);
      if(hp<=0&&!playerDead){
        playerDead=true;hp=0;
        gunG.visible=false;
        document.getElementById('ch').style.display='none';
        document.getElementById('specHud').style.display='block';
        showMsg('你已阵亡 - 观战模式',2000);
        // Check if all allies also dead
        const aliveAllies=allies.filter(a=>!a.dead);
        if(aliveAllies.length===0){winRound('def');return;}
        spectateIdx=0;
      }updHUD();continue;
    }
    if(b.t<=0){scene.remove(b.m);eBullets.splice(i,1);}
  }

  // Trails
  for(let i=trails.length-1;i>=0;i--){
    const tr=trails[i];
    if(tr.type==='tracer'){
      tr.prog+=dt*12;
      // 到达终点时生成弹孔
      if(tr.prog>=1&&!tr.marked){
        tr.marked=true;
        if(tr.hitWall&&tr.hitPos&&tr.hitNormal){
          const decalGeo=new THREE.CircleGeometry(.06,8);
          const decalMat=new THREE.MeshBasicMaterial({color:0x111111,transparent:true,opacity:.7,side:THREE.DoubleSide});
          const decal=new THREE.Mesh(decalGeo,decalMat);
          decal.position.copy(tr.hitPos).add(tr.hitNormal.clone().multiplyScalar(.01));
          decal.lookAt(decal.position.clone().add(tr.hitNormal));
          scene.add(decal);
          // 弹孔周围裂纹
          for(let ci=0;ci<4;ci++){
            const crack=new THREE.Mesh(new THREE.BoxGeometry(.005,.001,.04+Math.random()*.03),new THREE.MeshBasicMaterial({color:0x222222,transparent:true,opacity:.5}));
            crack.position.copy(tr.hitPos).add(tr.hitNormal.clone().multiplyScalar(.012));
            crack.lookAt(crack.position.clone().add(tr.hitNormal));
            crack.rotation.z=ci*Math.PI/4+Math.random()*.3;
            scene.add(crack);
            abFx.push({m:crack,t:1500,type:'decal'});
          }
          abFx.push({m:decal,t:1500,type:'decal'});
        }
      }
      if(tr.prog>=1){scene.remove(tr.m);trails.splice(i,1);continue;}
      tr.m.position.lerpVectors(tr.start,tr.end,Math.min(tr.prog,1));
    }else{
      tr.t--;tr.m.material.opacity*=.6;
    }
    if(tr.t<=0){scene.remove(tr.m);trails.splice(i,1);}
  }

  // Ability fx
  for(let i=abFx.length-1;i>=0;i--){
    const a=abFx[i];a.t--;
    // 火箭弹飞行
    if(a.type==='rocket'){
      a.m.position.addScaledVector(a.vel,dt);
      // 命中敌人或撞墙→爆炸
      let rocketHit=false;const rPos=a.m.position;
      for(const e of enemies){if(!e.dead&&rPos.distanceTo(e.mesh.position)<2){rocketHit=true;break;}}
      if(!rocketHit){for(const wl of walls){if(Math.abs(rPos.x-wl.x)<wl.hw&&Math.abs(rPos.z-wl.z)<wl.hd&&rPos.y<(wl.hh||4)){rocketHit=true;break;}}}
      if(rocketHit||rPos.y<=.2){
        // 爆炸范围伤害
        enemies.forEach(e=>{if(!e.dead&&e.mesh.position.distanceTo(rPos)<8){e.hp-=120;sfx('hit');if(e.hp<=0){e.dead=true;e.deathT=30;kills++;creds+=200;sfx('kill');addKF(e.type,false);}}});
        const boom=new THREE.Mesh(new THREE.SphereGeometry(6,10,8),new THREE.MeshBasicMaterial({color:0xff4422,transparent:true,opacity:.4}));
        boom.position.copy(rPos);scene.add(boom);abFx.push({m:boom,t:30,type:'healfx'});
        scene.remove(a.m);abFx.splice(i,1);continue;
      }
    }
    // 寻猎者追踪
    if(a.type==='seeker'&&a.target){
      const t=a.target;
      if(!t.dead){
        const dir=new THREE.Vector3(t.mesh.position.x-a.m.position.x,1-a.m.position.y,t.mesh.position.z-a.m.position.z).normalize();
        a.m.position.addScaledVector(dir,dt*12);
        if(a.m.position.distanceTo(t.mesh.position)<1.5){t.fireT+=5;sfx('hit');scene.remove(a.m);abFx.splice(i,1);continue;}
      }else{scene.remove(a.m);abFx.splice(i,1);continue;}
    }
    // (thrashFx已改为玩家操控)
    // 风暴之刃飞刀(纯视觉飞行)
    if(a.type==='bladeVisual'){
      a.prog+=dt*8;
      if(a.prog>=1){scene.remove(a.m);abFx.splice(i,1);continue;}
      a.m.position.lerpVectors(a.start,a.end,Math.min(a.prog,1));
      a.m.rotation.z+=dt*15;
    }
    // 弧光闪光(贝塞尔曲线弧线飞行)
    if(a.type==='curveball'){
      a.time+=dt*2; // 0→1 in 0.5秒
      a.m.rotation.x+=dt*10;a.m.rotation.z+=dt*8;
      const t=Math.min(a.time,1);
      // 二次贝塞尔: B(t) = (1-t)²P0 + 2(1-t)tP1 + t²P2
      const t1=1-t;
      a.m.position.x=t1*t1*a.p0.x+2*t1*t*a.p1.x+t*t*a.p2.x;
      a.m.position.y=t1*t1*a.p0.y+2*t1*t*a.p1.y+t*t*a.p2.y;
      a.m.position.z=t1*t1*a.p0.z+2*t1*t*a.p1.z+t*t*a.p2.z;
      // 到终点或撞墙→爆炸
      let landed=t>=1;
      if(!landed){for(const wl of walls){if(Math.abs(a.m.position.x-wl.x)<wl.hw&&Math.abs(a.m.position.z-wl.z)<wl.hd){landed=true;break;}}}
      if(landed){
        const lp=a.m.position.clone();scene.remove(a.m);abFx.splice(i,1);
        if(a.onLand)a.onLand(lp);continue;
      }
    }
    // 投掷物飞行(抛物线)
    if(a.type==='projectile'){
      a.vel.y-=20*dt; // 重力
      a.m.position.addScaledVector(a.vel,dt);
      a.m.rotation.x+=dt*8;a.m.rotation.z+=dt*5;
      // 落地检测
      if(a.m.position.y<=.2){
        a.m.position.y=.2;
        const lp=a.m.position.clone();
        scene.remove(a.m);abFx.splice(i,1);
        if(a.onLand)a.onLand(lp);
        continue;
      }
      // 撞墙检测(高于墙顶不算)
      let hitW=false;
      for(const wl of walls){if(Math.abs(a.m.position.x-wl.x)<wl.hw&&Math.abs(a.m.position.z-wl.z)<wl.hd&&a.m.position.y<(wl.hh||4)){hitW=true;break;}}
      if(hitW){
        const lp=a.m.position.clone();lp.y=.2;
        scene.remove(a.m);abFx.splice(i,1);
        if(a.onLand)a.onLand(lp);
        continue;
      }
    }
    // 墙壁/屏障升起动画
    if(a.rising&&a.targetY){
      a.m.position.y=THREE.MathUtils.lerp(a.m.position.y,a.targetY,.06);
      if(Math.abs(a.m.position.y-a.targetY)<.05)a.rising=false;
    }
    // 烟雾/减速展开动画
    if(a.expanding){
      const s=a.m.scale.x;
      if(s<1){a.m.scale.set(Math.min(s+dt*2,1),Math.min(s+dt*2,1),Math.min(s+dt*2,1));}
      else a.expanding=false;
    }
    if(a.type==='flash')a.m.scale.multiplyScalar(1.1);
    if(a.type==='leer'){
      a.m.position.y=2.5+Math.sin(Date.now()*.003)*.3;
      a.m.rotation.y+=dt*1.5;
      const s=a.hp>50?1:1+Math.sin(Date.now()*.01)*.15;
      a.m.scale.set(s,s,s);
    }
    if(a.type==='soulOrb'){
      const by=a.baseY||1.2;
      a.m.position.y=by+Math.sin(Date.now()*.004)*.25;
      a.m.rotation.y+=dt*2;
      const os=1+Math.sin(Date.now()*.006)*.1;
      a.m.scale.set(os,os,os);
      if(a.m.material)a.m.material.opacity=.5+Math.sin(Date.now()*.005)*.2;
    }
    if(a.type==='healfx'){a.m.scale.multiplyScalar(1.04);if(a.m.material)a.m.material.opacity*=.95;else a.m.children.forEach(c=>{if(c.material)c.material.opacity*=.95;});}
    if(a.t<=0){scene.remove(a.m);abFx.splice(i,1);}
  }

  updateFootprints(dt);
  // Bonus zones — earn gold by standing on them
  if(!playerDead&&typeof bonusZones!=='undefined'){
    for(const bz of bonusZones){
      const bdx=pos.x-bz.x,bdz=pos.z-bz.z;
      if(bdx*bdx+bdz*bdz<bz.r*bz.r){creds+=Math.floor(50*dt);updHUD();}
    }
  }
  updHUD();

  // ═══ 联机同步 ═══
  if(mpMode&&mpPeer&&state==='playing'){
    mpSyncTimer+=dt*1000;
    if(mpSyncTimer>=MP_SYNC_RATE){mpSyncTimer=0;mpSyncState();}
    mpUpdatePlayers();
  }

  ren.render(scene,camera);
  }catch(err){console.error('loop error:',err);}
}
loop();
</script>
</body>
